<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>漢字習寫系統 - 專業控制最終版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4338ca; --amber: #f59e0b; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; touch-action: none; overflow: hidden; height: 100dvh; }
        .kai-text { font-family: "KaiTi TC", "STKaiti", "BiauKai", "標楷體", "DFKai-SB", "Apple LiSung", serif; font-weight: bold; }
        .pop-font { font-weight: 900; letter-spacing: -1px; }

        .tian-grid-wrapper { transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); transform-origin: center center; }
        .tian-grid-container {
            width: 85vw; max-width: 500px; aspect-ratio: 1 / 1; position: relative;
            background-color: #fff; border-radius: 16px; overflow: hidden; border: 4px solid #f87171;
        }

        .tian-grid-bg::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; border-top: 2.5px dashed #fca5a5; z-index: 1; }
        .tian-grid-bg::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; border-left: 2.5px dashed #fca5a5; z-index: 1; }

        .btn-push { transition: all 0.1s; box-shadow: 0 4px 0 #1e1b4b; }
        .btn-push:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 1px 0 #1e1b4b; }
        
        #answer-overlay {
            pointer-events: none; opacity: 0; transition: opacity 0.4s; color: rgba(67, 56, 202, 0.14);
            display: flex; align-items: center; justify-content: center;
            z-index: 5; position: absolute; inset: 0; width: 100%; height: 100%; overflow: hidden; line-height: 1;
        }
        #answer-overlay.show { opacity: 1; }

        /* 教師示範層 z-200：絕對高於學生黑色畫筆 z-10 */
        #teacher-collab-layer { position: absolute; inset: 0; z-index: 200; pointer-events: none; width: 100%; height: 100%; object-fit: contain; }
        canvas { position: absolute; inset: 0; z-index: 10; touch-action: none; cursor: crosshair; width: 100%; height: 100%; background: transparent; }

        #draggable-toolbar { position: fixed; right: 15px; top: 25%; z-index: 250; cursor: move; touch-action: none; user-select: none; width: 44px; padding: 12px 4px; }
        .zoom-controls { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 150; }
        
        #st-char-container {
            width: min(38vw, 420px); height: min(38vw, 420px);
            word-break: break-all; overflow-wrap: break-word; text-align: center;
            display: flex; align-items: center; justify-content: center; padding: 25px;
            background: #fff; border-radius: 40px; border: 4px solid #fde68a; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative;
        }
        #st-char { line-height: 1.15; width: 100%; transition: opacity 0.3s; z-index: 50; position: relative; display: none; }
        #st-waiting-msg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 40px; z-index: 40; color: #94a3b8; font-weight: 900; font-size: 26px; text-align: center; padding: 30px; }

        #collab-modal, #auth-modal { backdrop-filter: blur(15px); }
        .locked-tool { filter: grayscale(1); opacity: 0.3 !important; pointer-events: none; transition: all 0.3s; }
        .tool-active { border: 4px solid #4338ca !important; transform: scale(1.1); box-shadow: 0 0 15px rgba(67, 56, 202, 0.4); }

        /* 監控板絕對防扁 */
        .monitor-card { background: white; border-radius: 32px; box-shadow: 0 15px 45px rgba(0,0,0,0.1); border: 2px solid #eef2f6; overflow: hidden; display: flex; flex-direction: column; width: 100%; min-height: 350px; flex-shrink: 0; aspect-ratio: 1/1; position: relative; }
        .monitor-header { background: #4338ca; color: white; padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .monitor-content-wrapper { position: relative; flex-grow: 1; width: 100%; height: 100%; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .monitor-mask { background: #f1f5f9; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-weight: 900; font-size: 20px; border-radius: 20px; border: 2px dashed #cbd5e1; position: absolute; inset: 15px; z-index: 10; text-align: center; }
        .monitor-img { width: 100%; height: 100%; object-fit: contain; display: block; padding: 10px; background: white; }
        
        .top-label { font-size: 14px; color: #94a3b8; font-weight: 900; text-transform: uppercase; margin-bottom: 3px; padding-left: 4px; }
        #teacher-preview-box { background: white; border: 2px solid #e2e8f0; border-radius: 12px; height: 52px; padding: 0 16px; display: flex; align-items: center; min-width: 180px; max-width: 350px; font-weight: 900; font-size: 18px; color: #4338ca; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        #display-join-code { font-size: 38px; line-height: 1; font-weight: 900; letter-spacing: -1px; }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="app" class="h-full flex flex-col">
    <!-- 1. 入口 -->
    <div id="mode-selector" class="absolute inset-0 z-[150] flex flex-col items-center justify-center bg-white p-6">
        <div class="text-center mb-24 font-black">
            <h1 class="text-7xl md:text-9xl pop-font text-indigo-700 italic tracking-tighter">漢字習寫系統</h1>
            <p class="text-3xl md:text-5xl font-black text-indigo-400 mt-4 tracking-widest italic font-bold">可師生雙向同步</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 w-full max-w-5xl font-bold">
            <button onclick="openAuthModal('teacher')" class="bg-indigo-600 text-white p-16 rounded-[60px] btn-push text-4xl font-black flex flex-col items-center shadow-2xl transition-transform hover:scale-105">👨‍🏫 教師主控</button>
            <button onclick="window.showNameInput()" class="bg-amber-500 text-white p-16 rounded-[60px] btn-push text-4xl font-black flex flex-col items-center shadow-2xl transition-transform hover:scale-105">👶 學生練習</button>
        </div>
    </div>

    <!-- 2. 密碼驗證模態框 (具備修改功能) -->
    <div id="auth-modal" class="hidden absolute inset-0 z-[400] flex items-center justify-center bg-slate-900/90 backdrop-blur-xl p-6 font-bold">
        <div class="bg-white p-12 rounded-[60px] shadow-2xl w-full max-sm:max-w-sm text-center border-b-8 border-indigo-200">
            <h2 id="auth-title" class="text-3xl font-black mb-8 text-indigo-700">管理員驗證</h2>
            <input type="password" id="admin-pw-input" class="w-full text-center text-5xl p-5 border-4 border-indigo-50 rounded-3xl mb-10 outline-none focus:border-indigo-500 font-bold" placeholder="••••••">
            <div class="flex gap-6 font-bold">
                <button onclick="closeAuthModal()" class="flex-1 bg-slate-100 text-slate-500 py-5 rounded-3xl font-bold text-xl">取消</button>
                <button id="auth-confirm-btn" class="flex-[2] bg-indigo-600 text-white py-5 rounded-3xl font-black text-2xl btn-push shadow-md">確認執行</button>
            </div>
        </div>
    </div>

    <!-- 3. 學生登入視窗 -->
    <div id="name-modal" class="hidden absolute inset-0 z-[300] flex items-center justify-center bg-slate-900/90 backdrop-blur-xl p-6 font-bold">
        <div class="bg-white p-12 rounded-[60px] shadow-2xl w-full max-sm:max-w-sm text-center border-b-8 border-indigo-200">
            <h2 class="text-3xl font-black mb-8 text-indigo-700 font-bold">準備練習囉</h2>
            <div class="space-y-6 mb-10">
                <input type="text" id="st-name-input" class="w-full text-center text-2xl p-5 border-4 border-indigo-50 rounded-3xl outline-none focus:border-indigo-500 font-bold" placeholder="您的姓名或座號">
                <input type="text" id="st-code-input" maxlength="6" class="w-full text-center text-5xl p-5 border-4 border-amber-100 rounded-3xl outline-none focus:border-amber-500 font-bold tracking-widest" placeholder="6 碼序號">
            </div>
            <button id="st-login-btn" onclick="initApp('student')" class="w-full bg-indigo-600 text-white py-6 rounded-3xl font-black text-2xl btn-push shadow-md">進入教室</button>
        </div>
    </div>

    <!-- 4. 教師主控台 -->
    <div id="teacher-view" class="hidden h-full flex flex-col bg-slate-50 font-bold">
        <header class="bg-white border-b px-6 py-5 flex justify-between items-center shrink-0 shadow-sm relative z-50">
            <div class="flex items-center gap-6">
                <button onclick="toggleSidebar()" class="bg-indigo-600 text-white px-5 py-3 rounded-2xl shadow-lg hover:bg-indigo-700 font-black text-base shrink-0">題庫設定</button>
                <button onclick="openAuthModal('change')" class="bg-slate-100 text-slate-600 px-5 py-3 rounded-2xl font-black text-base hover:bg-slate-200">🔑 修改密碼</button>
                <div class="flex flex-col bg-amber-50 border border-amber-200 px-6 py-2 rounded-2xl shrink-0 font-bold">
                    <span class="top-label text-amber-600 font-black font-bold">學生登入序號</span>
                    <span id="display-join-code" class="font-black text-amber-700 tracking-tighter leading-none font-bold">------</span>
                </div>
                <div class="flex flex-col gap-1 font-bold">
                   <span class="top-label text-slate-400 font-bold">學生題目預覽</span>
                   <div id="teacher-preview-box" class="truncate italic font-black text-indigo-600">無題目</div>
                </div>
                
                <button id="global-action-btn" onclick="toggleGlobalAction()" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl shadow-xl font-black text-xl btn-push">開始作答</button>

                <div class="flex items-center gap-3 bg-indigo-100 px-5 py-2 rounded-full border border-indigo-200">
                    <input type="checkbox" id="answer-toggle" onchange="syncAnswerReveal()" class="w-6 h-6 accent-indigo-600">
                    <label class="text-sm font-black text-indigo-700 uppercase font-bold">公布解答</label>
                </div>
                <div id="teacher-timer-box" class="flex flex-col bg-amber-50 border border-amber-200 px-5 py-2 rounded-2xl font-bold font-bold font-bold font-bold">
                    <div class="flex items-center gap-3">
                        <label class="text-sm font-black text-amber-700 uppercase font-bold">限時(秒)</label>
                        <input type="number" id="timer-duration" value="30" min="0" class="w-16 text-center text-lg font-black bg-white border border-amber-200 rounded-lg py-1 font-bold">
                    </div>
                    <p class="text-[10px] text-amber-500 font-black mt-1 tracking-tighter italic">時間設置為 0 時為無限制作答時間</p>
                </div>
                <!-- QR Code 恢復按鈕 -->
                <button onclick="window.showQRCode()" class="bg-indigo-50 text-indigo-700 px-5 py-3 rounded-xl shadow-sm text-sm font-black font-bold font-bold font-bold">📲 連線碼</button>
            </div>
            <div id="conn-count" class="bg-indigo-600 text-white px-6 py-2.5 rounded-full text-base font-black shadow-lg">在線: 0</div>
        </header>
        <main class="flex-grow flex overflow-hidden">
            <aside id="teacher-sidebar" class="bg-white border-r flex flex-col shrink-0 shadow-inner z-40 w-80 font-bold">
                <div id="sidebar-content" class="flex flex-col h-full font-bold">
                    <div class="p-8 border-b bg-slate-50 text-center font-bold">
                        <textarea id="data-input" class="w-full h-64 border-2 border-slate-100 rounded-3xl p-5 text-sm outline-none focus:border-indigo-500 font-bold font-bold" placeholder="生字：語詞"></textarea>
                        <button onclick="parseData()" class="w-full mt-6 bg-slate-800 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-black transition-all">同步內容</button>
                    </div>
                    <div id="quiz-list-full" class="flex-grow overflow-y-auto p-5 space-y-4 bg-slate-50 font-bold"></div>
                </div>
                <div id="sidebar-nav-vertical" class="hidden flex flex-col items-center py-8 gap-4 overflow-y-auto scrollbar-hide bg-slate-50 border-l border-slate-100 font-bold font-bold font-bold"></div>
            </aside>
            <section class="flex-grow p-10 overflow-y-auto bg-slate-100 font-bold">
                <div class="flex justify-between items-center mb-8 px-6 font-bold font-bold">
                    <div class="flex items-center gap-6 font-bold font-bold">
                        <h3 class="text-3xl font-black text-slate-800 italic underline decoration-amber-400 font-bold font-bold">實時監控牆</h3>
                        <div class="flex gap-3 bg-white p-1.5 rounded-full border shadow-inner">
                            <button onclick="forceAllMasks(true)" class="text-sm px-5 py-2 rounded-full font-black text-slate-500 border border-transparent hover:border-slate-200">全部遮蔽</button>
                            <button onclick="forceAllMasks(false)" class="text-sm px-5 py-2 rounded-full font-black text-indigo-600 border border-transparent hover:border-indigo-200 font-bold">全解除</button>
                        </div>
                    </div>
                    <button onclick="clearAllSubs()" class="text-sm font-black text-red-500 hover:underline">清空數據</button>
                </div>
                <div id="monitor-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-10 items-start font-bold"></div>
            </section>
        </main>
    </div>

    <!-- 5. 學生端 -->
    <div id="student-view" class="hidden h-full flex flex-col bg-[#fffefc] font-bold">
        <header class="bg-white border-b px-10 py-5 flex justify-between items-center shrink-0 shadow-md relative z-40 font-bold">
            <div class="flex flex-col font-bold">
                <div id="st-word" class="text-4xl font-black text-indigo-700 italic">漢字習寫</div>
                <div id="st-id-display" class="text-xs font-black text-indigo-300 uppercase tracking-widest italic font-bold">ID: ----</div>
            </div>
            <div class="flex gap-6 items-center">
                <div id="timer-display" class="hidden bg-amber-500 text-white px-8 py-3 rounded-3xl font-black text-3xl shadow-xl animate-pulse font-bold">⏱ <span id="timer-seconds">--</span>s</div>
                <div id="reveal-status" class="bg-indigo-50 text-indigo-400 px-6 py-3 rounded-2xl font-black text-base border border-indigo-100 flex items-center gap-3">
                    <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75 font-bold font-bold font-bold"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-indigo-500 font-bold"></span></span>狀態載入中...
                </div>
                <button onclick="studentQuit()" class="bg-red-50 text-red-500 px-8 py-3 rounded-2xl font-black text-base border border-red-100 shadow-sm font-bold font-bold font-bold">🚪 退出</button>
            </div>
        </header>
        <main class="flex-grow flex items-center justify-start p-10 md:p-16 relative overflow-hidden font-bold">
            <div id="st-char-container" class="shrink-0 font-bold font-bold font-bold font-bold">
                <div id="st-waiting-msg" class="font-bold">等待老師開啟題目</div>
                <div id="st-char" class="kai-text text-slate-800 leading-none font-black text-center font-bold hidden">?</div>
            </div>
            <div class="flex-grow flex items-center justify-center font-bold font-bold">
                <div id="zoom-wrapper" class="tian-grid-wrapper font-bold">
                    <div class="tian-grid-container shadow-2xl font-bold font-bold font-bold">
                        <div class="tian-grid-bg absolute inset-0 font-bold font-bold font-bold font-bold"></div>
                        <div id="answer-overlay" class="kai-text font-bold"></div>
                        <!-- 教師層 z-200 確保蓋過黑筆 -->
                        <img id="teacher-collab-layer" class="hidden font-bold">
                        <canvas id="main-canvas"></canvas>
                    </div>
                </div>
            </div>
            <div id="draggable-toolbar" class="bg-white/95 backdrop-blur-md rounded-[30px] shadow-2xl flex flex-col items-center gap-5 border border-indigo-50 font-bold">
                <div class="w-8 h-2 bg-slate-200 rounded-full mt-2.5 opacity-50 font-bold font-bold"></div>
                <div class="flex flex-col gap-4 font-bold" id="st-tools font-bold">
                    <button onclick="setStudentMode('pen')" class="st-btn w-11 h-11 rounded-xl bg-black border-2 border-white shadow-md tool-active font-bold" id="st-pen-btn"></button>
                    <button onclick="setStudentMode('eraser')" id="st-eraser-btn" class="st-btn w-11 h-11 rounded-xl bg-white border-2 border-slate-100 flex items-center justify-center text-2xl shadow-sm font-bold font-bold">🧽</button>
                </div>
                <div class="flex flex-col gap-4 border-t border-slate-100 pt-5 font-bold font-bold font-bold">
                    <button id="st-undo-btn" onclick="undo()" class="st-btn bg-amber-100 text-amber-700 w-11 h-11 rounded-xl font-black text-xl flex items-center justify-center active:scale-90 shadow-sm font-bold font-bold">↩</button>
                    <button id="st-clear-btn" onclick="clearCanvas()" class="st-btn bg-slate-100 text-slate-600 w-11 h-11 rounded-xl font-black text-xl flex items-center justify-center active:scale-90 shadow-sm font-bold font-bold font-bold">🧹</button>
                </div>
            </div>
            <div class="zoom-controls">
                <button onclick="adjustZoom(0.1)" class="w-16 h-16 bg-white rounded-full shadow-2xl border border-indigo-50 flex items-center justify-center text-4xl font-black text-indigo-600 active:scale-90 font-bold">+</button>
                <button onclick="adjustZoom(-0.1)" class="w-16 h-16 bg-white rounded-full shadow-xl border border-indigo-100 flex items-center justify-center text-4xl font-black text-indigo-600 active:scale-90 font-bold">-</button>
            </div>
        </main>
    </div>

    <!-- 6. 教師協作視窗 (絕對激活重構版) -->
    <div id="collab-modal" class="hidden fixed inset-0 z-[600] flex items-center justify-center bg-slate-900/85 p-6 font-bold">
        <div class="bg-white w-full max-w-5xl rounded-[60px] shadow-2xl flex flex-col overflow-hidden max-h-[95vh] font-bold font-bold font-bold">
            <header class="p-8 bg-indigo-600 text-white flex justify-between items-center shrink-0">
                <div class="flex items-center gap-8 font-bold font-bold">
                    <div><h3 class="text-3xl font-black italic font-bold" id="collab-st-title font-bold">師生同步協作</h3><p class="text-xs opacity-80 uppercase font-black font-bold font-bold font-bold">教師筆劃覆蓋學生黑筆</p></div>
                    <div class="bg-indigo-700/50 px-6 py-3 rounded-3xl flex items-center gap-3 border border-white/20">
                        <input type="checkbox" id="collab-lock-student" onchange="syncStudentForceLock()" class="w-6 h-6 accent-indigo-400 font-bold">
                        <label class="text-sm font-black font-bold font-bold font-bold">🔒 鎖定學生操作</label>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button onclick="window.clearStudentRemote()" class="bg-amber-500 hover:bg-amber-600 px-8 py-3 rounded-2xl font-black text-base shadow-xl transition-all font-bold font-bold font-bold">👤 全清該生</button>
                    <button onclick="closeCollab()" class="bg-white/20 px-8 py-3 rounded-2xl font-black text-base border border-white/30 font-bold font-bold font-bold font-bold">關閉</button>
                </div>
            </header>
            <main class="flex-grow flex flex-col md:flex-row p-10 gap-12 items-center justify-center bg-slate-50 overflow-y-auto">
                <div id="collab-canvas-container" class="relative bg-white shadow-2xl rounded-3xl overflow-hidden border-8 border-indigo-200 shrink-0 font-bold font-bold font-bold font-bold font-bold font-bold" style="width: 500px; height: 500px;">
                    <!-- 學生背景 (z-10) -->
                    <img id="collab-st-preview" class="absolute inset-0 z-10 w-full h-full object-contain pointer-events-none opacity-40 font-bold font-bold">
                    <!-- 教師操作畫布 (z-20) 永遠在學生之上 -->
                    <canvas id="collab-canvas" class="relative z-20 w-full h-full font-bold font-bold font-bold font-bold font-bold font-bold"></canvas>
                </div>
                <div class="flex flex-col gap-6 font-bold font-bold font-bold">
                    <button onclick="window.setCollabMode('red')" class="tc-tool w-16 h-16 rounded-3xl bg-red-500 border-4 border-white shadow-xl tool-active font-bold font-bold font-bold font-bold" data-tool="red"></button>
                    <button onclick="window.setCollabMode('blue')" class="tc-tool w-16 h-16 rounded-3xl bg-blue-500 border-4 border-white shadow-xl font-bold font-bold font-bold font-bold" data-tool="blue"></button>
                    <button onclick="window.setCollabMode('eraser')" class="tc-tool w-16 h-16 rounded-3xl bg-white border-4 border-white shadow-xl flex items-center justify-center text-4xl font-bold font-bold font-bold font-bold font-bold font-bold" data-tool="eraser">🧽</button>
                    <div class="border-t pt-6 flex flex-col gap-6 font-bold font-bold">
                        <button onclick="undoCollab()" class="w-16 h-16 rounded-3xl bg-indigo-50 text-indigo-700 shadow-lg text-3xl font-bold font-bold font-bold font-bold">↩</button>
                        <button onclick="clearCollabCanvas()" class="w-16 h-16 rounded-3xl bg-slate-100 text-slate-600 shadow-lg text-2xl font-bold font-bold font-bold font-bold font-bold font-bold font-bold">🧹</button>
                    </div>
                </div>
            </main>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, deleteDoc, updateDoc, arrayUnion, getDocs } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyBBIi6sw-wUzp-Jxc3dXJhl5DZ3-6LMe-o", authDomain: "my-handwriting-tool.firebaseapp.com", projectId: "my-handwriting-tool", storageBucket: "my-handwriting-tool.firebasestorage.app", messagingSenderId: "649810632937", appId: "1:649810632937:web:085f7e5c8f5290d6da9078" };
    const app = initializeApp(firebaseConfig), db = getFirestore(app), auth = getAuth(app);
    // 頻道鎖定
    const ID = "ice-hanzi-privacy-vFinal-Locked-vUltimate-2026-FINAL-V3"; 
    let user = null, quizData = [], curIdx = -1, stName = '', zoom = 1.0, collabTargetUid = null, isLocked = true, isSidebarCollapsed = true;
    let submissionsData = [], visibleUids = new Set(), currentJoinCode = "", collabMode = 'red', authType = 'teacher';

    // 核心認證先行
    onAuthStateChanged(auth, async u => { 
        user = u; 
        if(!u) {
            const res = await signInAnonymously(auth);
            user = res.user;
        }
    });

    window.showNameInput = () => document.getElementById('name-modal').classList.remove('hidden');

    // 全域 Enter 鍵監聽
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            const adminInput = document.getElementById('admin-pw-input'), stNameInput = document.getElementById('st-name-input'), stCodeInput = document.getElementById('st-code-input');
            if (adminInput === document.activeElement) document.getElementById('auth-confirm-btn').click();
            if (stNameInput === document.activeElement) stCodeInput.focus();
            if (stCodeInput === document.activeElement) document.getElementById('st-login-btn').click();
        }
    });

    window.openAuthModal = (type) => {
        authType = type; const m = document.getElementById('auth-modal');
        document.getElementById('admin-pw-input').value = ""; m.classList.remove('hidden');
        document.getElementById('auth-title').innerText = type === 'teacher' ? "管理員驗證" : "修改管理密碼";
    };
    window.closeAuthModal = () => document.getElementById('auth-modal').classList.add('hidden');

    document.getElementById('auth-confirm-btn').onclick = async () => {
        if(!user) await signInAnonymously(auth);
        const val = document.getElementById('admin-pw-input').value.trim(); if(!val) return;
        if(authType === 'teacher'){
            const s = await getDoc(doc(db, 'artifacts', ID, 'public', 'data', 'config', 'admin'));
            if(val === (s.exists() ? s.data().adminPassword : "ice888")) { closeAuthModal(); initApp('teacher'); } else alert("密碼錯誤");
        } else {
            await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'config', 'admin'), { adminPassword: val }, { merge: true });
            alert("修改成功，下次登入即生效。"); closeAuthModal();
        }
    };

    window.toggleSidebar = () => {
        isSidebarCollapsed = !isSidebarCollapsed;
        const sidebar = document.getElementById('teacher-sidebar'), content = document.getElementById('sidebar-content'), verticalNav = document.getElementById('sidebar-nav-vertical');
        sidebar.style.width = isSidebarCollapsed ? '60px' : '320px';
        content.classList.toggle('hidden', isSidebarCollapsed);
        verticalNav.classList.toggle('hidden', !isSidebarCollapsed);
    };

    window.toggleGlobalAction = async () => {
        const stateRef = doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current');
        const s = await getDoc(stateRef);
        const d = s.data() || {};
        if (!d.isStarted || d.isPaused) {
            const dur = parseInt(document.getElementById('timer-duration').value) || 0;
            const endTime = dur > 0 ? Date.now() + (dur * 1000) : 0;
            await setDoc(stateRef, { isStarted: true, isPaused: false, timerEndTime: endTime }, { merge: true });
        } else {
            await setDoc(stateRef, { isPaused: true }, { merge: true });
        }
    };

    window.initApp = async role => {
        if(!user) { const res = await signInAnonymously(auth); user = res.user; }
        if(role === 'student'){
            const codeInput = document.getElementById('st-code-input').value.trim();
            const serverDoc = await getDoc(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'));
            const serverCode = serverDoc.exists() ? serverDoc.data().joinCode : "";
            if(!serverCode) { alert("教室尚未同步，請等待老師按同步內容"); return; }
            if(codeInput !== serverCode) { alert("序號錯誤，請向老師詢問最新 6 碼"); return; }
            stName = document.getElementById('st-name-input').value.trim() || `練習者-${Math.random().toString(36).substring(2,6).toUpperCase()}`;
            document.getElementById('st-id-display').innerText = `ID: ${stName}`;
            document.getElementById('name-modal').classList.add('hidden');
            await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { name: stName, image: '', ts: Date.now(), collabImage: '', clearReq: false, eraseReq: [], forceLocked: false });
        }
        document.getElementById('mode-selector').classList.add('hidden');
        if(role === 'teacher') setupTeacher(); else setupStudent();
    };

    window.studentQuit = async () => { if(confirm("確定退出？")) { if(user) await deleteDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid)); location.reload(); } };
    window.deleteOneStudent = async uid => { if(confirm("移除此學生？")) await deleteDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', uid)); };
    window.syncAnswerReveal = async () => { await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), { showAnswer: document.getElementById('answer-toggle').checked }, { merge: true }); };

    window.toggleMask = uid => { if(visibleUids.has(uid)) visibleUids.delete(uid); else visibleUids.add(uid); renderMonitorGrid(); };
    window.forceAllMasks = shouldMask => { visibleUids.clear(); if(!shouldMask) submissionsData.forEach(s => visibleUids.add(s.id)); renderMonitorGrid(); };

    async function setupTeacher() {
        document.getElementById('teacher-view').classList.remove('hidden');
        document.getElementById('data-input').value = "範：範本、範例\n習：習寫、練習\n寫：寫作、寫字"; 
        if(!user) await signInAnonymously(auth);
        const sRef = doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current');
        // 強制產生新碼
        currentJoinCode = Math.floor(100000 + Math.random() * 900000).toString();
        document.getElementById('display-join-code').innerText = currentJoinCode;
        await setDoc(sRef, { joinCode: currentJoinCode, isPaused: true, isStarted: false, timerEndTime: 0 }, { merge: true });
        parseData(); 
        onSnapshot(collection(db, 'artifacts', ID, 'public', 'data', 'submissions'), snap => {
            submissionsData = []; snap.forEach(d => submissionsData.push({ id: d.id, ...d.data() }));
            document.getElementById('conn-count').innerText = `在線: ${snap.size}`;
            renderMonitorGrid();
        });
        onSnapshot(sRef, snap => {
            if(snap.exists()){
                const d = snap.data(); document.getElementById('app').dataset.gs = JSON.stringify(d);
                if(d.data) quizData = d.data;
                document.querySelectorAll('.number-btn-v').forEach(btn => btn.classList.toggle('active', parseInt(btn.dataset.idx) === d.idx));
                document.getElementById('answer-toggle').checked = !!d.showAnswer;
                if(d.data && d.idx !== undefined) {
                    const i = d.data[d.idx];
                    if(i) document.getElementById('teacher-preview-box').innerText = i.context.split(i.target).join('□');
                }
                const actBtn = document.getElementById('global-action-btn');
                if(!d.isStarted || d.isPaused) { actBtn.innerText = "開始作答"; actBtn.className = "bg-indigo-600 text-white px-10 py-4 rounded-2xl shadow-xl font-black text-xl btn-push"; }
                else { actBtn.innerText = "停止作答"; actBtn.className = "bg-red-500 text-white px-10 py-4 rounded-2xl shadow-xl font-black text-xl btn-push"; }
            }
        });
    }

    // --- 教師協作：全域強行代理方案 ---
    window.openCollab = function(uid, name, locked) { 
        collabTargetUid = uid; 
        document.getElementById('collab-st-title').innerText = `與 ${name} 協作中`; 
        document.getElementById('collab-lock-student').checked = !!locked;
        
        // 瞬間提取快照背景
        const target = submissionsData.find(s => s.id === uid);
        if(target) document.getElementById('collab-st-preview').src = target.image || '';

        document.getElementById('collab-modal').classList.remove('hidden'); 
        // 重要：重新啟動
        setTimeout(() => window.initCollabDrawing(), 300);
    };

    window.renderMonitorGrid = function() {
        const grid = document.getElementById('monitor-grid'); grid.innerHTML = '';
        submissionsData.forEach(data => {
            const isVisible = visibleUids.has(data.id);
            const card = document.createElement('div');
            card.className = "monitor-card font-bold";
            // 使用 window.openCollab 全域掛載
            card.innerHTML = `<div class="monitor-header font-black text-[12px] font-bold"><span>${data.name}</span><div class="flex gap-2 font-bold"><button onclick="toggleMask('${data.id}')" class="bg-white/20 w-6 h-6 rounded flex items-center justify-center text-[14px] font-bold">${isVisible?'👁️':'👁️‍🗨️'}</button><button onclick="window.openCollab('${data.id}', '${data.name}', ${data.forceLocked})" class="bg-white/20 px-1 rounded-md text-[11px] font-black font-bold font-bold font-bold font-bold">🤝</button><button onclick="deleteOneStudent('${data.id}')" class="bg-red-500 w-6 h-6 rounded-full flex items-center justify-center text-[16px]">×</button></div></div><div class="monitor-content-wrapper">${!isVisible ? '<div class="monitor-mask font-bold">內容隱藏中</div>' : `<img src="${data.image || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'}" class="monitor-img font-bold font-bold font-bold font-bold font-bold font-bold">`}</div>`;
            grid.appendChild(card);
            if(collabTargetUid === data.id) document.getElementById('collab-st-preview').src = data.image;
        });
    }

    window.closeCollab = () => { collabTargetUid = null; document.getElementById('collab-modal').classList.add('hidden'); };
    window.clearStudentRemote = async () => { if(collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { clearReq: true, image: '' }); };
    window.syncStudentForceLock = async () => { if(collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { forceLocked: document.getElementById('collab-lock-student').checked }); };

    window.parseData = () => { 
        quizData = document.getElementById('data-input').value.split('\n').map(l => { const p = l.split(/[：:]/); return { target: p[0]?.trim() || '', context: p[1]?.trim() || '' }; }).filter(i => i.target !== ''); 
        renderNav(); forceAllMasks(true);
        syncGlobal({ data: quizData, idx: 0, ts: Date.now(), showAnswer: false, isPaused: true, isStarted: false, timerEndTime: 0 }); 
    };

    function renderNav() { 
        const navV = document.getElementById('sidebar-nav-vertical'), navFull = document.getElementById('quiz-list-full');
        navV.innerHTML = quizData.map((it, idx) => `<button onclick="setQuiz(${idx})" class="number-btn-v font-black text-slate-400 bg-white border border-slate-200 rounded-xl flex items-center justify-center text-sm font-bold font-bold" data-idx="${idx}">${idx+1}</button>`).join('');
        navFull.innerHTML = quizData.map((it, idx) => `<button onclick="setQuiz(${idx})" class="w-full text-left p-5 rounded-3xl border-2 border-white bg-white shadow-sm flex justify-between items-center font-bold" data-idx="${idx}"><span class="kai-text text-xl font-bold font-bold">${it.target}</span><span class="text-[11px] text-slate-300 font-black italic font-bold"># ${idx+1}</span></button>`).join('');
    }

    window.setQuiz = async idx => { curIdx = idx; forceAllMasks(true); syncGlobal({ idx, ts: Date.now(), showAnswer: false, isPaused: true, isStarted: false, timerEndTime: 0 }); };
    async function syncGlobal(p) { await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), { ...p }, { merge: true }); }

    function setupStudent() {
        document.getElementById('student-view').classList.remove('hidden'); initCanvas();
        onSnapshot(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), s => {
            if(!s.exists()) { alert("連線中斷。"); location.reload(); return; }
            const d = s.data(); const layer = document.getElementById('teacher-collab-layer');
            if(d.collabImage) { layer.src = d.collabImage; layer.classList.remove('hidden'); } else layer.classList.add('hidden');
            if(d.clearReq) { const sc = document.getElementById('main-canvas').getContext('2d'); sc.clearRect(0,0,500,500); updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { clearReq: false, image: '' }); }
            if(d.eraseReq?.length) { 
                const sCtx = document.getElementById('main-canvas').getContext('2d');
                sCtx.globalCompositeOperation = 'destination-out'; 
                d.eraseReq.forEach(p => { sCtx.beginPath(); sCtx.arc(p.x, p.y, 45, 0, Math.PI*2); sCtx.fill(); }); 
                sCtx.globalCompositeOperation = 'source-over'; 
                updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { eraseReq: [] }); autoUp(); 
            }
            checkTotalLock(d.forceLocked);
        });

        const checkTotalLock = (fl) => {
            const d = JSON.parse(document.getElementById('app').dataset.gs || '{}');
            let timeUp = d.timerEndTime > 0 && Date.now() >= d.timerEndTime;
            const locked = timeUp || d.isPaused || d.showAnswer || fl || !d.isStarted;
            isLocked = locked;
            document.querySelectorAll('.st-btn').forEach(b => b.classList.toggle('locked-tool', locked));
            const statusEl = document.getElementById('reveal-status');
            if(statusEl) statusEl.innerText = !d.isStarted ? "⏸ 等待老師開啟" : (d.showAnswer ? "✨ 對照解答中" : (fl ? "🔒 已由老師鎖定" : (timeUp ? "🔒 限時結束" : "作答中...")));
            
            const waitingMsg = document.getElementById('st-waiting-msg'), charEl = document.getElementById('st-char');
            if(!d.isStarted) { waitingMsg.style.display = 'flex'; charEl.style.display = 'none'; } 
            else { waitingMsg.style.display = 'none'; charEl.style.display = 'block'; charEl.style.opacity = '1'; }
        };

        onSnapshot(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), s => {
            if(s.exists()){
                const d = s.data(); document.getElementById('app').dataset.gs = JSON.stringify(d);
                if(d.data) quizData = d.data; const nIdx = d.idx || 0;
                const i = quizData[nIdx] || { target: '?', context: '' };
                document.getElementById('st-char').innerText = i.context.split(i.target).join('□');
                document.getElementById('answer-overlay').innerText = i.target;
                document.getElementById('answer-overlay').classList.toggle('show', !!d.showAnswer);
                checkTotalLock();
            }
        });
    }

    const canvas = document.getElementById('main-canvas'), ctx = canvas.getContext('2d');
    let drawing = false, history = [], studentMode = 'pen';

    function initCanvas() {
        const reset = () => { canvas.width = 500; canvas.height = 500; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 14; ctx.strokeStyle = '#000000'; };
        reset(); window.addEventListener('resize', reset);
        const getXY = e => { const r = canvas.getBoundingClientRect(); const cx = (e.touches ? e.touches[0].clientX : e.clientX), cy = (e.touches ? e.touches[0].clientY : e.clientY); return { x: (cx - r.left) * (500 / r.width), y: (cy - r.top) * (500 / r.height) }; };
        canvas.onmousedown = canvas.ontouchstart = e => { if(isLocked) return; drawing = true; const p = getXY(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.globalCompositeOperation = studentMode === 'eraser' ? 'destination-out' : 'source-over'; ctx.strokeStyle = '#000000'; };
        canvas.onmousemove = canvas.ontouchmove = e => { if(!drawing || isLocked) return; if(e.cancelable) e.preventDefault(); const p = getXY(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
        window.onmouseup = window.ontouchend = () => { if(drawing) { drawing = false; autoUp(); } };
    }

    window.setStudentMode = (m) => { 
        if(isLocked) return; studentMode = m; 
        document.getElementById('st-eraser-btn').classList.toggle('tool-active', m === 'eraser'); 
        document.getElementById('st-pen-btn').classList.toggle('tool-active', m === 'pen'); 
    };
    
    // --- 教師協作：全域強行啟動 ---
    window.initCollabDrawing = function() {
        const cCanvas = document.getElementById('collab-canvas'); if(!cCanvas) return;
        const cCtx = cCanvas.getContext('2d');
        cCanvas.width = 500; cCanvas.height = 500;
        cCtx.lineCap = 'round'; cCtx.lineJoin = 'round'; cCtx.lineWidth = 14; cCtx.strokeStyle = '#ef4444';
        let cDraw = false; 
        const getXYC = e => { const r = cCanvas.getBoundingClientRect(); const cx = (e.touches ? e.touches[0].clientX : e.clientX), cy = (e.touches ? e.touches[0].clientY : e.clientY); return { x: (cx - r.left) * (500 / r.width), y: (cy - r.top) * (500 / r.height) }; };
        cCanvas.onmousedown = cCanvas.ontouchstart = e => { cDraw = true; const p = getXYC(e); cCtx.beginPath(); cCtx.moveTo(p.x, p.y); cCtx.globalCompositeOperation = collabMode === 'eraser' ? 'destination-out' : 'source-over'; cCtx.strokeStyle = (collabMode === 'blue') ? '#3b82f6' : '#ef4444'; if(e.cancelable) e.preventDefault(); };
        cCanvas.onmousemove = cCanvas.ontouchmove = async e => { if(!cDraw) return; const p = getXYC(e); cCtx.lineTo(p.x, p.y); cCtx.stroke(); if(collabMode === 'eraser' && collabTargetUid) { await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { eraseReq: arrayUnion({x: p.x, y: p.y}) }); } if(e.cancelable) e.preventDefault(); };
        cCanvas.onmouseup = cCanvas.onmouseleave = cCanvas.ontouchend = async () => { if(cDraw) { cDraw = false; if(collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { collabImage: cCanvas.toDataURL() }); } };
        window.setCollabMode = (m) => { collabMode = m; document.querySelectorAll('.tc-tool').forEach(b => b.classList.toggle('tool-active', b.dataset.tool === m)); };
        window.clearCollabCanvas = async (sync = true) => { cCtx.clearRect(0,0,500,500); if(sync && collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { collabImage: '' }); };
    }

    window.adjustZoom = d => { zoom = Math.max(0.5, Math.min(2, zoom + d)); document.getElementById('zoom-wrapper').style.transform = `scale(${zoom})`; };
    async function autoUp() { if(!user || !stName) return; const image = document.getElementById('main-canvas').toDataURL('image/png', 0.2); await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { name: stName, image, ts: Date.now() }, { merge: true }); }
    
    // 恢復 QR Code 功能與「複製網址」
    window.showQRCode = () => {
        const url = window.location.href, box = document.createElement('div');
        box.className = "fixed inset-0 z-[600] flex items-center justify-center bg-black/70 p-6";
        box.onclick = (e) => { if(e.target === box) box.remove(); };
        box.innerHTML = `<div class="bg-white p-12 rounded-[60px] text-center shadow-2xl font-bold max-sm:w-full"><h3 class="font-black text-3xl mb-6 text-indigo-700 italic">連線 QR 碼與網址</h3><div id="qrc-container" class="flex justify-center mb-8"></div><div class="bg-slate-50 p-6 rounded-3xl mb-8"><div class="text-[12px] text-slate-400 mb-2 font-black uppercase font-bold">連線網址</div><div class="text-sm text-indigo-600 truncate mb-6 font-black font-bold">${url}</div><button id="copy-link-btn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">📋 複製網址連結</button></div><p class="text-sm text-slate-400 font-black">點擊背景關閉視窗</p></div>`;
        document.body.appendChild(box);
        new QRCode(document.getElementById('qrc-container'), { text: url, width: 250, height: 250 });
        document.getElementById('copy-link-btn').onclick = () => {
            const el = document.createElement('textarea'); el.value = url; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            const btn = document.getElementById('copy-link-btn'); btn.innerText = "✅ 已複製網址！"; setTimeout(() => btn.innerText = "📋 複製網址連結", 2000);
        };
    };

    window.clearAllSubs = async () => { if(confirm("確定清空全班？學生將被強制重新進入。")) { const snap = await getDocs(collection(db, 'artifacts', ID, 'public', 'data', 'submissions')); snap.forEach(d => deleteDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', d.id))); } };
    const tb = document.getElementById('draggable-toolbar'); let isDragging = false, offset = { x: 0, y: 0 };
    const onStart = e => { isDragging = true; const cx = (e.touches ? e.touches[0].clientX : e.clientX), cy = (e.touches ? e.touches[0].clientY : e.clientY); offset.x = cx - tb.offsetLeft; offset.y = cy - tb.offsetTop; };
    const onMove = e => { if(!isDragging) return; if(e.cancelable) e.preventDefault(); const cx = (e.touches ? e.touches[0].clientX : e.clientX), cy = (e.touches ? e.touches[0].clientY : e.clientY); tb.style.left = `${cx - offset.x}px`; tb.style.top = `${cy - offset.y}px`; tb.style.right = 'auto'; };
    tb.addEventListener('mousedown', onStart); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', () => isDragging = false);
    tb.addEventListener('touchstart', onStart, {passive:false}); window.addEventListener('touchmove', onMove, {passive:false}); window.addEventListener('touchend', () => isDragging = false);
</script>
</body>
</html>
