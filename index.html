<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>漢字習寫系統 - 可師生雙向同步</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4338ca; --amber: #f59e0b; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; touch-action: none; overflow: hidden; height: 100dvh; }
        .kai-text { font-family: "KaiTi TC", "STKaiti", "BiauKai", "標楷體", "DFKai-SB", "Apple LiSung", serif; font-weight: bold; }
        .pop-font { font-weight: 900; letter-spacing: -1px; }
        .tian-grid-wrapper { transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); transform-origin: center center; }
        .tian-grid-container {
            width: 85vw; max-width: 500px; aspect-ratio: 1 / 1; position: relative;
            background-color: #fff; border-radius: 16px; overflow: hidden; border: 4px solid #f87171;
        }
        .tian-grid-bg::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; border-top: 2.5px dashed #fca5a5; z-index: 1; }
        .tian-grid-bg::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; border-left: 2.5px dashed #fca5a5; z-index: 1; }
        .btn-push { transition: all 0.1s; box-shadow: 0 4px 0 #1e1b4b; }
        .btn-push:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 1px 0 #1e1b4b; }
        .btn-push:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
        #answer-overlay {
            pointer-events: none; opacity: 0; transition: opacity 0.4s; color: rgba(67, 56, 202, 0.14);
            display: flex; align-items: center; justify-content: center;
            z-index: 5; position: absolute; inset: 0; width: 100%; height: 100%; overflow: hidden; line-height: 1;
        }
        #answer-overlay.show { opacity: 1; }
        #teacher-collab-layer { position: absolute; inset: 0; z-index: 7; pointer-events: none; width: 100%; height: 100%; object-fit: contain; }
        canvas { position: absolute; inset: 0; z-index: 10; touch-action: none; cursor: crosshair; width: 100%; height: 100%; background: transparent; }
        #draggable-toolbar { position: fixed; right: 15px; top: 25%; z-index: 100; cursor: move; touch-action: none; user-select: none; width: 44px; padding: 12px 4px; }
        .zoom-controls { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 150; }
        .tool-active { border: 3px solid #4338ca !important; transform: scale(1.1); box-shadow: 0 0 12px rgba(67, 56, 202, 0.4); }
        #st-char-container {
            width: min(38vw, 420px); height: min(38vw, 420px);
            word-break: break-all; overflow-wrap: break-word; text-align: center;
            display: flex; align-items: center; justify-content: center; padding: 25px;
            background: #fff; border-radius: 40px; border: 4px solid #fde68a; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative;
        }
        #st-char { line-height: 1.15; width: 100%; transition: opacity 0.3s; }
        #st-waiting-msg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 40px; z-index: 20; color: #94a3b8; font-weight: 900; font-size: 24px; text-align: center; padding: 20px; }
        #collab-modal, #auth-modal { backdrop-filter: blur(15px); }
        .locked-tool { filter: grayscale(1); opacity: 0.3 !important; pointer-events: none; transition: all 0.3s; }
        .tooltip-box { display: none; position: absolute; top: 50px; left: 0; width: 280px; background: white; border: 2px solid #4338ca; border-radius: 20px; padding: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); z-index: 100; text-align: left; }
        .info-btn:hover .tooltip-box { display: block; }
        #teacher-sidebar { transition: width 0.3s; position: relative; overflow: hidden; }
        .number-btn-v { transition: all 0.2s; width: 44px; height: 44px; flex-shrink: 0; }
        .number-btn-v.active { background-color: #4338ca; color: white; border-radius: 12px; }
        .monitor-mask { background: #f1f5f9; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-weight: bold; font-size: 10px; border-radius: 20px; border: 1px dashed #cbd5e1; height: 100%; width: 100%; }
        #teacher-preview-box { background: white; border: 2px solid #e2e8f0; border-radius: 12px; height: 44px; padding: 0 12px; display: flex; align-items: center; min-width: 100px; max-width: 250px; font-weight: bold; }
    </style>
</head>
<body>

<div id="app" class="h-full flex flex-col">
    <!-- 1. 入口 -->
    <div id="mode-selector" class="absolute inset-0 z-[150] flex flex-col items-center justify-center bg-white p-6">
        <div class="text-center mb-16 font-bold">
            <h1 class="text-6xl md:text-8xl pop-font text-indigo-700 italic font-black">漢字習寫系統</h1>
            <p class="text-2xl md:text-3xl text-indigo-400 mt-2 italic font-bold">可師生雙向同步</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 w-full max-w-3xl">
            <button onclick="openAuthModal('teacher')" class="bg-indigo-600 text-white p-12 rounded-[50px] btn-push text-3xl font-black flex flex-col items-center shadow-xl">👨‍🏫 教師主控</button>
            <button onclick="window.showNameInput()" class="bg-amber-500 text-white p-12 rounded-[50px] btn-push text-3xl font-black flex flex-col items-center shadow-xl">👶 學生練習</button>
        </div>
    </div>

    <!-- 2. 密碼框 -->
    <div id="auth-modal" class="hidden absolute inset-0 z-[180] flex items-center justify-center bg-slate-900/90 backdrop-blur-xl p-6 font-bold">
        <div class="bg-white p-10 rounded-[60px] shadow-2xl w-full max-w-sm text-center border-b-8 border-indigo-200">
            <h2 id="auth-title" class="text-3xl font-black mb-6 text-indigo-700">驗證身分</h2>
            <input type="password" id="admin-pw-input" class="w-full text-center text-3xl p-5 border-4 border-indigo-50 rounded-3xl mb-8 outline-none focus:border-indigo-500" placeholder="••••••">
            <div class="flex gap-4">
                <button onclick="closeAuthModal()" class="flex-1 bg-slate-100 py-4 rounded-3xl">取消</button>
                <button id="auth-confirm-btn" class="flex-[2] bg-indigo-600 text-white py-4 rounded-3xl font-black btn-push">確認驗證</button>
            </div>
        </div>
    </div>

    <!-- 3. 學生登入 -->
    <div id="name-modal" class="hidden absolute inset-0 z-[160] flex items-center justify-center bg-slate-900/90 backdrop-blur-xl p-6 font-bold">
        <div class="bg-white p-10 rounded-[60px] shadow-2xl w-full max-w-sm text-center border-b-8 border-indigo-200">
            <h2 class="text-3xl font-black mb-6 text-indigo-700">進入練習教室</h2>
            <div class="space-y-4 mb-8">
                <input type="text" id="st-name-input" class="w-full text-center text-2xl p-4 border-4 border-indigo-50 rounded-3xl outline-none focus:border-indigo-500 font-bold" placeholder="姓名或座號">
                <input type="text" id="st-code-input" maxlength="6" class="w-full text-center text-3xl p-4 border-4 border-amber-100 rounded-3xl outline-none focus:border-amber-500 font-bold tracking-widest" placeholder="6 碼序號">
            </div>
            <button onclick="initApp('student')" class="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black text-2xl btn-push shadow-md">驗證進入</button>
        </div>
    </div>

    <!-- 4. 教師主控 -->
    <div id="teacher-view" class="hidden h-full flex flex-col bg-slate-50 font-bold">
        <header class="bg-white border-b px-6 py-4 flex justify-between items-center shrink-0 shadow-sm relative z-50">
            <div class="flex items-center gap-3">
                <button id="sidebar-toggle-btn" onclick="toggleSidebar()" class="bg-indigo-600 text-white px-3 py-2 rounded-xl shadow hover:bg-indigo-700 text-xs shrink-0">題庫設定</button>
                <div class="relative info-btn shrink-0">
                    <button class="bg-indigo-50 text-indigo-600 w-9 h-9 rounded-full flex items-center justify-center text-lg border border-indigo-100 shadow-inner">💡</button>
                    <div class="tooltip-box text-xs">
                        <h4 class="font-black text-indigo-700 border-b pb-1 mb-1">出題語法</h4>
                        <p class="mb-2">簽：簽名、簽收<br>冒號前為核心生字。</p>
                        <h4 class="font-black text-indigo-700 border-b pb-1 mb-1">鎖定邏輯</h4>
                        <p>1. 切換新題預設暫停，按「開始」或取消勾選「暫停」方可開始。<br>2. 移除學生會令其強制斷線。</p>
                    </div>
                </div>
                <div class="flex flex-col bg-amber-50 border border-amber-200 px-4 py-1.5 rounded-2xl shrink-0">
                    <span class="text-[8px] text-amber-600 font-bold uppercase">登入序號</span>
                    <span id="display-join-code" class="text-xl font-black text-amber-700 tracking-tighter leading-none font-bold">------</span>
                </div>
                <div id="teacher-preview-box" class="text-indigo-400 text-xs truncate italic">無題目</div>
                <div class="flex items-center gap-2 bg-indigo-100 px-3 py-1.5 rounded-full border border-indigo-200">
                    <input type="checkbox" id="answer-toggle" onchange="syncAnswerReveal()" class="w-4 h-4 accent-indigo-600">
                    <label class="text-[10px] font-black text-indigo-700 uppercase">公布解答</label>
                </div>
                <div id="teacher-timer-box" class="flex items-center gap-2 bg-amber-50 px-3 py-1.5 rounded-full border border-amber-200">
                    <input type="checkbox" id="timer-toggle" onchange="syncTimerConfig()" class="w-4 h-4 accent-amber-600">
                    <label class="text-[10px] font-black text-amber-700 uppercase">限時</label>
                    <input type="number" id="timer-duration" value="30" class="w-10 text-center text-xs font-bold bg-white border border-amber-200 rounded py-0.5">
                    <button id="start-timer-btn" onclick="startCountdownNow()" class="bg-amber-500 text-white px-2 py-0.5 rounded text-[9px] font-bold">開始</button>
                </div>
                <div class="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200 font-bold">
                    <input type="checkbox" id="pause-toggle" onchange="syncPauseState()" class="w-4 h-4 accent-slate-600" checked>
                    <label class="text-[10px] font-black text-slate-700 uppercase">暫停作答</label>
                </div>
                <button onclick="showQRCode()" class="bg-indigo-600 text-white px-3 py-2 rounded-xl shadow text-[10px] font-black font-bold">📲 連線碼</button>
                <button onclick="openAuthModal('change')" class="bg-slate-100 text-slate-600 px-2 py-2 rounded-xl text-[10px] font-black font-bold">🔑 密碼</button>
            </div>
            <div id="conn-count" class="bg-indigo-600 text-white px-4 py-2 rounded-full text-xs font-black shadow-lg font-bold">在線: 0</div>
        </header>
        <main class="flex-grow flex overflow-hidden">
            <aside id="teacher-sidebar" class="bg-white border-r flex flex-col shrink-0 shadow-inner z-40 w-80 font-bold">
                <div id="sidebar-content" class="flex flex-col h-full font-bold">
                    <div class="p-6 border-b bg-slate-50 text-center">
                        <textarea id="data-input" class="w-full h-48 border-2 border-slate-100 rounded-2xl p-4 text-xs outline-none focus:border-indigo-500 font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold" placeholder="生字：語詞、語詞"></textarea>
                        <button onclick="parseData()" class="w-full mt-4 bg-slate-800 text-white py-3 rounded-xl font-bold shadow-md">同步並收摺</button>
                    </div>
                    <div id="quiz-list-full" class="flex-grow overflow-y-auto p-4 space-y-3 bg-slate-50"></div>
                </div>
                <div id="sidebar-nav-vertical" class="hidden flex flex-col items-center py-6 gap-3 overflow-y-auto scrollbar-hide bg-slate-50 border-l border-slate-100 font-bold font-bold"></div>
            </aside>
            <section class="flex-grow p-8 overflow-y-auto bg-slate-100 font-bold">
                <div class="flex justify-between items-center mb-6 px-4">
                    <div class="flex items-center gap-4">
                        <h3 class="text-2xl font-black text-slate-800 italic underline decoration-amber-400">實時監控牆</h3>
                        <div class="flex gap-2 bg-white p-1 rounded-full border shadow-sm">
                            <button onclick="forceAllMasks(true)" class="text-[10px] px-3 py-1 rounded-full font-black text-slate-500 border border-transparent hover:border-slate-200">全部遮蔽</button>
                            <button onclick="forceAllMasks(false)" class="text-[10px] px-3 py-1 rounded-full font-black text-indigo-600 border border-transparent hover:border-indigo-200">全部解除</button>
                        </div>
                    </div>
                    <button onclick="clearAllSubs()" class="text-xs font-bold text-red-500 hover:underline">清空數據</button>
                </div>
                <div id="monitor-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
            </section>
        </main>
    </div>

    <!-- 5. 學生端 -->
    <div id="student-view" class="hidden h-full flex flex-col bg-[#fffefc] font-bold">
        <header class="bg-white border-b px-8 py-4 flex justify-between items-center shrink-0 shadow-md relative z-40 font-bold">
            <div class="flex flex-col">
                <div id="st-word" class="text-3xl font-black text-indigo-700 leading-none mb-1 tracking-tight italic">漢字習寫</div>
                <div id="st-id-display" class="text-[10px] font-black text-indigo-300 uppercase tracking-widest italic">ID: ----</div>
            </div>
            <div class="flex gap-4 items-center">
                <div id="timer-display" class="hidden bg-amber-500 text-white px-6 py-2 rounded-2xl font-black text-xl shadow-lg animate-pulse">⏱ <span id="timer-seconds">--</span>s</div>
                <div id="reveal-status" class="bg-indigo-50 text-indigo-400 px-4 py-2 rounded-2xl font-black text-xs border border-indigo-100 flex items-center gap-2">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span></span>載入中...
                </div>
                <button onclick="studentQuit()" class="bg-red-50 text-red-500 px-6 py-2 rounded-2xl font-black text-sm border border-red-100 shadow-sm font-bold">🚪 退出</button>
            </div>
        </header>
        <main class="flex-grow flex items-center justify-start p-6 md:p-12 relative overflow-hidden font-bold">
            <div id="st-char-container" class="shrink-0 font-bold">
                <div id="st-waiting-msg" class="hidden font-bold">請等待老師開啟題目</div>
                <div id="st-char" class="kai-text text-slate-800 leading-none font-black text-center font-bold">?</div>
            </div>
            <div class="flex-grow flex items-center justify-center">
                <div id="zoom-wrapper" class="tian-grid-wrapper">
                    <div class="tian-grid-container shadow-2xl font-bold">
                        <div class="tian-grid-bg absolute inset-0"></div>
                        <div id="answer-overlay" class="kai-text font-bold"></div>
                        <img id="teacher-collab-layer" class="hidden">
                        <canvas id="main-canvas"></canvas>
                    </div>
                </div>
            </div>
            <div id="draggable-toolbar" class="bg-white/95 backdrop-blur-md rounded-[26px] shadow-2xl flex flex-col items-center gap-4 border border-indigo-50 font-bold">
                <div class="w-7 h-1.5 bg-slate-200 rounded-full mt-2 opacity-50"></div>
                <div class="flex flex-col gap-3.5" id="st-tools">
                    <button onclick="setStudentMode('pen', '#3b82f6')" class="st-btn w-10 h-10 rounded-xl bg-blue-500 border-2 border-white shadow-sm tool-active" data-color="#3b82f6"></button>
                    <button onclick="setStudentMode('eraser')" id="st-eraser-btn" class="st-btn w-10 h-10 rounded-xl bg-white border-2 border-slate-100 flex items-center justify-center text-xl shadow-sm">🧽</button>
                </div>
                <div class="flex flex-col gap-3.5 border-t border-slate-100 pt-3.5 font-bold font-bold font-bold font-bold font-bold font-bold font-bold">
                    <button id="st-undo-btn" onclick="undo()" class="st-btn bg-amber-100 text-amber-700 w-10 h-10 rounded-xl font-black text-xl flex items-center justify-center active:scale-90 shadow-sm">↩</button>
                    <button id="st-clear-btn" onclick="clearCanvas()" class="st-btn bg-slate-100 text-slate-600 w-10 h-10 rounded-xl font-black text-xl flex items-center justify-center active:scale-90 shadow-sm font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold">🧹</button>
                </div>
                <div class="mb-2"></div>
            </div>
            <div class="zoom-controls font-bold font-bold font-bold font-bold font-bold font-bold font-bold">
                <button onclick="adjustZoom(0.1)" class="w-14 h-14 bg-white rounded-full shadow-2xl border border-indigo-50 flex items-center justify-center text-3xl font-black text-indigo-600 active:scale-90 font-bold font-bold font-bold font-bold font-bold font-bold font-bold">+</button>
                <button onclick="adjustZoom(-0.1)" class="w-14 h-14 bg-white rounded-full shadow-2xl border border-indigo-50 flex items-center justify-center text-3xl font-black text-indigo-600 active:scale-90 font-bold font-bold font-bold font-bold font-bold font-bold font-bold">-</button>
            </div>
        </main>
    </div>

    <!-- 6. 協作 -->
    <div id="collab-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/85 p-4 font-bold">
        <div class="bg-white w-full max-w-4xl rounded-[40px] shadow-2xl flex flex-col overflow-hidden max-h-[95vh]">
            <header class="p-6 bg-indigo-600 text-white flex justify-between items-center shrink-0">
                <div class="flex items-center gap-6">
                    <div><h3 class="text-2xl font-black italic font-bold" id="collab-st-title">協作中</h3><p class="text-[10px] opacity-80 uppercase">畫筆同步擦除學生筆劃</p></div>
                    <div class="bg-indigo-700/50 px-4 py-2 rounded-2xl flex items-center gap-2 border border-white/20">
                        <input type="checkbox" id="collab-lock-student" onchange="syncStudentForceLock()" class="w-5 h-5 accent-indigo-400">
                        <label class="text-xs font-black">🔒 鎖定學生畫筆</label>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="clearStudentRemote()" class="bg-amber-500 hover:bg-amber-600 px-6 py-2 rounded-2xl font-black text-sm shadow-lg font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold">👤 全清學生筆劃</button>
                    <button onclick="closeCollab()" class="bg-white/20 px-6 py-2 rounded-2xl font-black text-sm border border-white/30 font-bold font-bold font-bold font-bold">關閉</button>
                </div>
            </header>
            <main class="flex-grow flex flex-col md:flex-row p-8 gap-8 items-center justify-center bg-slate-50 overflow-y-auto">
                <div class="relative bg-white shadow-xl rounded-2xl overflow-hidden border-4 border-indigo-200 shrink-0 font-bold font-bold font-bold font-bold" style="width: 460px; height: 460px;">
                    <img id="collab-st-preview" class="absolute inset-0 z-10 w-full h-full object-contain pointer-events-none opacity-40 font-bold font-bold font-bold">
                    <canvas id="collab-canvas" class="relative z-20 w-full h-full font-bold font-bold font-bold"></canvas>
                </div>
                <div class="flex flex-col gap-4">
                    <button onclick="setCollabMode('pen', '#ef4444')" class="tc-tool w-14 h-14 rounded-2xl bg-red-500 border-4 border-white shadow-xl tool-active font-bold" data-tool="red"></button>
                    <button onclick="setCollabMode('pen', '#3b82f6')" class="tc-tool w-14 h-14 rounded-2xl bg-blue-500 border-4 border-white shadow-xl font-bold" data-tool="blue"></button>
                    <button onclick="setCollabMode('eraser')" class="tc-tool w-14 h-14 rounded-2xl bg-white border-4 border-white shadow-xl flex items-center justify-center text-3xl font-bold font-bold font-bold" data-tool="eraser">🧽</button>
                    <div class="border-t pt-4 flex flex-col gap-4 font-bold font-bold font-bold">
                        <button onclick="undoCollab()" class="w-14 h-14 rounded-2xl bg-indigo-50 text-indigo-700 shadow-lg text-2xl font-bold font-bold font-bold">↩</button>
                        <button onclick="clearCollabCanvas()" class="w-14 h-14 rounded-2xl bg-slate-100 text-slate-600 shadow-lg text-2xl font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold font-bold">🧹</button>
                    </div>
                </div>
            </main>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, deleteDoc, updateDoc, arrayUnion, getDocs } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyBBIi6sw-wUzp-Jxc3dXJhl5DZ3-6LMe-o", authDomain: "my-handwriting-tool.firebaseapp.com", projectId: "my-handwriting-tool", storageBucket: "my-handwriting-tool.firebasestorage.app", messagingSenderId: "649810632937", appId: "1:649810632937:web:085f7e5c8f5290d6da9078" };
    const app = initializeApp(firebaseConfig), db = getFirestore(app), auth = getAuth(app);
    const ID = "ice-hanzi-privacy-expert-final-vFinal"; 
    let user = null, quizData = [], curIdx = -1, stName = '', zoom = 1.0, collabTargetUid = null, isLocked = true, isSidebarCollapsed = true;
    let visibleUids = new Set(), currentJoinCode = "";

    onAuthStateChanged(auth, async u => { user = u; if(!u) await signInAnonymously(auth); });

    window.showNameInput = () => document.getElementById('name-modal').classList.remove('hidden');

    let authType = 'teacher';
    window.openAuthModal = (type) => {
        authType = type; const m = document.getElementById('auth-modal');
        document.getElementById('admin-pw-input').value = ""; m.classList.remove('hidden');
        document.getElementById('auth-title').innerText = type === 'teacher' ? "管理員登入" : "修改管理密碼";
    };
    window.closeAuthModal = () => document.getElementById('auth-modal').classList.add('hidden');

    document.getElementById('auth-confirm-btn').onclick = async () => {
        const val = document.getElementById('admin-pw-input').value.trim(); if(!val) return;
        if(authType === 'teacher'){
            const s = await getDoc(doc(db, 'artifacts', ID, 'public', 'data', 'config', 'admin'));
            if(val === (s.exists() ? s.data().adminPassword : "ice888")) { closeAuthModal(); initApp('teacher'); } else alert("密碼錯誤");
        } else { await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'config', 'admin'), { adminPassword: val }, { merge: true }); alert("修改成功"); closeAuthModal(); }
    };

    window.toggleSidebar = () => {
        isSidebarCollapsed = !isSidebarCollapsed;
        const sidebar = document.getElementById('teacher-sidebar'), content = document.getElementById('sidebar-content'), verticalNav = document.getElementById('sidebar-nav-vertical'), toggleBtn = document.getElementById('sidebar-toggle-btn');
        sidebar.style.width = isSidebarCollapsed ? '60px' : '320px';
        content.classList.toggle('hidden', isSidebarCollapsed);
        verticalNav.classList.toggle('hidden', !isSidebarCollapsed);
        toggleBtn.innerText = isSidebarCollapsed ? '🛠️' : '題庫設定';
    };

    window.syncTimerConfig = async () => {
        const enabled = document.getElementById('timer-toggle').checked, dur = parseInt(document.getElementById('timer-duration').value) || 30;
        await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), { timerEnabled: enabled, timerDuration: dur }, { merge: true });
    };
    window.startCountdownNow = async () => {
        const dur = parseInt(document.getElementById('timer-duration').value) || 30;
        await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), { timerEndTime: Date.now() + (dur * 1000), isPaused: false }, { merge: true });
    };
    window.syncPauseState = async () => { await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), { isPaused: document.getElementById('pause-toggle').checked }, { merge: true }); };

    window.initApp = async role => {
        if(!user) { try { user = (await signInAnonymously(auth)).user; } catch(e) { alert("連線失敗"); return; } }
        if(role === 'student'){
            const codeInput = document.getElementById('st-code-input').value.trim();
            const s = await getDoc(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'));
            if(!s.exists() || !s.data().joinCode) { alert("教室尚未開放，請等待老師開啟題目"); return; }
            if(codeInput !== s.data().joinCode) { alert("序號錯誤"); return; }

            stName = document.getElementById('st-name-input').value.trim() || `學生-${Math.random().toString(36).substring(2,6).toUpperCase()}`;
            document.getElementById('st-id-display').innerText = `ID: ${stName}`;
            document.getElementById('name-modal').classList.add('hidden');
            await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { name: stName, image: '', ts: Date.now(), collabImage: '', clearReq: false, eraseReq: [], forceLocked: false });
        }
        document.getElementById('mode-selector').classList.add('hidden');
        if(role === 'teacher') setupTeacher(); else setupStudent();
    };

    window.studentQuit = async () => { if(confirm("確定退出？")) { if(user) await deleteDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid)); location.reload(); } };
    window.deleteOneStudent = async uid => { if(confirm("移除此學生？對方將被強制重新登入。")) await deleteDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', uid)); };
    window.syncAnswerReveal = async () => { await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), { showAnswer: document.getElementById('answer-toggle').checked }, { merge: true }); };

    window.toggleMask = uid => { if(visibleUids.has(uid)) visibleUids.delete(uid); else visibleUids.add(uid); renderMonitorGrid(); };
    window.forceAllMasks = shouldMask => { visibleUids.clear(); if(!shouldMask) submissionsData.forEach(s => visibleUids.add(s.id)); renderMonitorGrid(); };

    let submissionsData = [];
    async function setupTeacher() {
        document.getElementById('teacher-view').classList.remove('hidden');
        const sRef = doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current');
        const sData = await getDoc(sRef);
        currentJoinCode = sData.exists() && sData.data().joinCode ? sData.data().joinCode : Math.floor(100000 + Math.random() * 900000).toString();
        document.getElementById('display-join-code').innerText = currentJoinCode;
        await setDoc(sRef, { joinCode: currentJoinCode, isPaused: true, timerEndTime: 0 }, { merge: true });

        parseData(); initCollabCanvas();
        onSnapshot(collection(db, 'artifacts', ID, 'public', 'data', 'submissions'), snap => {
            submissionsData = []; snap.forEach(d => submissionsData.push({ id: d.id, ...d.data() }));
            document.getElementById('conn-count').innerText = `在線: ${snap.size}`;
            renderMonitorGrid();
        });
        onSnapshot(sRef, snap => {
            if(snap.exists()){
                const d = snap.data(); const running = d.timerEnabled && d.timerEndTime && Date.now() < d.timerEndTime;
                document.getElementById('timer-toggle').disabled = running;
                document.getElementById('pause-toggle').checked = !!d.isPaused;
                document.querySelectorAll('.number-btn-v').forEach(btn => btn.classList.toggle('active', parseInt(btn.dataset.idx) === d.idx));
                document.getElementById('answer-toggle').checked = !!d.showAnswer;
                if(d.data && d.idx !== undefined) {
                    const i = d.data[d.idx];
                    document.getElementById('teacher-preview-box').innerText = i ? i.context.split(i.target).join('□') : '無題目';
                }
            }
        });
    }

    function renderMonitorGrid() {
        const grid = document.getElementById('monitor-grid'); grid.innerHTML = '';
        submissionsData.forEach(data => {
            const isVisible = visibleUids.has(data.id);
            const card = document.createElement('div');
            card.className = "bg-white rounded-[32px] shadow-lg border p-2 relative overflow-hidden transition-all";
            card.innerHTML = `<div class="bg-indigo-600 text-white text-[8px] px-2.5 py-1.5 rounded-xl mb-1.5 flex justify-between items-center"><span class="truncate pr-1">${data.name}</span><div class="flex gap-1"><button onclick="toggleMask('${data.id}')" class="bg-white/20 w-5 h-5 rounded flex items-center justify-center text-[10px]">${isVisible?'👁️':'👁️‍🗨️'}</button><button onclick="openCollab('${data.id}', '${data.name}', ${data.forceLocked})" class="bg-white/20 px-1 rounded-md text-[7px] font-bold">🤝</button><button onclick="deleteOneStudent('${data.id}')" class="bg-red-500 w-4 h-4 rounded-full flex items-center justify-center text-[10px]">×</button></div></div>${!isVisible ? '<div class="monitor-mask font-bold">遮蔽中</div>' : `<img src="${data.image || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'}" class="w-full aspect-square object-contain bg-white rounded-2xl shadow-inner font-bold">`}`;
            grid.appendChild(card);
            if(collabTargetUid === data.id) document.getElementById('collab-st-preview').src = data.image;
        });
    }

    window.openCollab = (uid, name, locked) => { 
        collabTargetUid = uid; document.getElementById('collab-st-title').innerText = `協作：${name}`; 
        document.getElementById('collab-lock-student').checked = !!locked;
        document.getElementById('collab-modal').classList.remove('hidden'); 
        setTimeout(initCollabCanvas, 200); // 延時確保 Modal 完全打開且座標正確
    };
    window.closeCollab = () => { collabTargetUid = null; document.getElementById('collab-modal').classList.add('hidden'); };
    window.clearStudentRemote = async () => { if(collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { clearReq: true }); };
    window.syncStudentForceLock = async () => { if(collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { forceLocked: document.getElementById('collab-lock-student').checked }); };

    window.parseData = () => { 
        quizData = document.getElementById('data-input').value.split('\n').map(l => { const p = l.split(/[：:]/); return { target: p[0]?.trim() || '', context: p[1]?.trim() || '' }; }).filter(i => i.target !== ''); 
        renderNav(); forceAllMasks(true);
        syncGlobal({ data: quizData, idx: 0, ts: Date.now(), showAnswer: false, isPaused: true, timerEndTime: 0 }); 
        if(!isSidebarCollapsed) toggleSidebar();
    };

    function renderNav() { 
        const navV = document.getElementById('sidebar-nav-vertical'), navFull = document.getElementById('quiz-list-full');
        navV.innerHTML = quizData.map((it, idx) => `<button onclick="setQuiz(${idx})" class="number-btn-v font-black text-slate-400 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-sm font-bold" data-idx="${idx}">${idx+1}</button>`).join('');
        navFull.innerHTML = quizData.map((it, idx) => `<button onclick="setQuiz(${idx})" class="w-full text-left p-4 rounded-2xl border-2 border-white bg-white shadow-sm flex justify-between items-center" data-idx="${idx}"><span class="kai-text text-xl">${it.target}</span><span class="text-[9px] text-slate-300 font-bold italic"># ${idx+1}</span></button>`).join('');
    }

    window.setQuiz = async idx => { curIdx = idx; forceAllMasks(true); syncGlobal({ idx, ts: Date.now(), showAnswer: false, isPaused: true, timerEndTime: 0 }); };
    async function syncGlobal(p) { await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), { ...p }, { merge: true }); }

    function setupStudent() {
        document.getElementById('student-view').classList.remove('hidden'); initCanvas();
        let lastIdx = -1, timerInt = null, forceLocked = false;
        
        onSnapshot(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), s => {
            if(!s.exists()) { alert("連線已結束。"); location.reload(); return; }
            const d = s.data(); const layer = document.getElementById('teacher-collab-layer');
            if(d.collabImage) { layer.src = d.collabImage; layer.classList.remove('hidden'); } else layer.classList.add('hidden');
            if(d.clearReq) { clearCanvas(); updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { clearReq: false }); }
            if(d.eraseReq?.length) { ctx.globalCompositeOperation = 'destination-out'; d.eraseReq.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 25, 0, Math.PI*2); ctx.fill(); }); ctx.globalCompositeOperation = 'source-over'; updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { eraseReq: [] }); autoUp(); }
            forceLocked = !!d.forceLocked; checkTotalLock();
        });

        const checkTotalLock = () => {
            const gs = document.getElementById('app').dataset.gs; if(!gs) return;
            const d = JSON.parse(gs);
            let timeUp = d.timerEnabled && d.timerEndTime && Date.now() >= d.timerEndTime;
            const locked = timeUp || d.isPaused || d.showAnswer || forceLocked;
            isLocked = locked;
            const statusMsg = d.isPaused ? "⏸ 準備中，等待開啟" : (d.showAnswer ? "✨ 解答對照中" : (forceLocked ? "🔒 老師鎖定了畫筆" : (timeUp ? "🔒 限時結束" : "作答中...")));
            updateLockUI(locked, statusMsg);
            document.getElementById('st-waiting-msg').classList.toggle('hidden', !d.isPaused);
            document.getElementById('st-char').style.opacity = d.isPaused ? '0' : '1';
        };

        onSnapshot(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), s => {
            if(s.exists()){
                const d = s.data(); document.getElementById('app').dataset.gs = JSON.stringify(d);
                if(d.data) quizData = d.data; const nIdx = d.idx || 0;
                if(nIdx !== lastIdx) { clearCanvas(); lastIdx = nIdx; }
                curIdx = nIdx; const i = quizData[curIdx] || { target: '?', context: '' };
                const charEl = document.getElementById('st-char'); 
                if(!d.isPaused && charEl) charEl.innerText = i.context.split(i.target).join('□');
                const updateFontSize = () => { let cEl = document.getElementById('st-char'); if(!cEl) return; let size = 180; cEl.style.fontSize = size + 'px'; const c = document.getElementById('st-char-container'); while ((cEl.scrollHeight > c.clientHeight || cEl.scrollWidth > c.clientWidth) && size > 30) { size -= 5; cEl.style.fontSize = size + 'px'; } }; setTimeout(updateFontSize, 50);
                const ansEl = document.getElementById('answer-overlay'); ansEl.innerText = i.target;
                const updateAnsFontSize = () => { let aSize = 420; ansEl.style.fontSize = aSize + 'px'; while ((ansEl.scrollHeight > ansEl.clientHeight || ansEl.scrollWidth > ansEl.clientWidth) && aSize > 40) { aSize -= 10; ansEl.style.fontSize = aSize + 'px'; } }; setTimeout(updateAnsFontSize, 50);
                document.getElementById('answer-overlay').classList.toggle('show', !!d.showAnswer);
                clearInterval(timerInt); const timerWrap = document.getElementById('timer-display');
                if(d.timerEnabled && d.timerEndTime) {
                    timerWrap.classList.remove('hidden');
                    const updateTimer = () => { const rem = Math.max(0, Math.ceil((d.timerEndTime - Date.now())/1000)); document.getElementById('timer-seconds').innerText = rem; if(rem <= 0) { clearInterval(timerInt); checkTotalLock(); } };
                    timerInt = setInterval(updateTimer, 500); updateTimer();
                } else timerWrap.classList.add('hidden');
                checkTotalLock();
            }
        });
    }

    function updateLockUI(locked, msg) {
        document.querySelectorAll('.st-btn').forEach(b => b.classList.toggle('locked-tool', locked));
        const statusEl = document.getElementById('reveal-status'); if(statusEl) statusEl.innerText = msg;
    }

    const canvas = document.getElementById('main-canvas'), ctx = canvas.getContext('2d'), collabCanvas = document.getElementById('collab-canvas'), collabCtx = collabCanvas?.getContext('2d');
    let drawing = false, history = [], collabHistory = [], penColor = '#3b82f6', studentMode = 'pen', collabMode = 'pen';

    function initCanvas() {
        const reset = () => { canvas.width = 500; canvas.height = 500; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 14; ctx.strokeStyle = penColor; };
        reset(); window.addEventListener('resize', reset);
        const getXY = e => { const r = canvas.getBoundingClientRect(); const cx = e.touches ? e.touches[0].clientX : e.clientX, cy = e.touches ? e.touches[0].clientY : e.clientY; return { x: (cx - r.left) * (500 / r.width), y: (cy - r.top) * (500 / r.height) }; };
        const start = e => { if(isLocked) return; drawing = true; const p = getXY(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.globalCompositeOperation = studentMode === 'eraser' ? 'destination-out' : 'source-over'; ctx.strokeStyle = penColor; };
        const move = e => { if(!drawing || isLocked) return; e.preventDefault(); const p = getXY(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
        const end = () => { if(drawing) { drawing = false; history.push(canvas.toDataURL()); autoUp(); } };
        canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
        canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', move, {passive:false}); canvas.addEventListener('touchend', end);
    }

    window.setStudentMode = (m, c) => { if(isLocked) return; studentMode = m; if(c) penColor = c; document.querySelectorAll('.st-btn').forEach(b => b.classList?.toggle('tool-active', m === 'pen' && b.dataset?.color === c)); document.getElementById('st-eraser-btn').classList.toggle('tool-active', m === 'eraser'); };
    
    function initCollabCanvas() {
        if(!collabCanvas) return;
        collabCanvas.width = 460; collabCanvas.height = 460;
        collabCtx.lineCap = 'round'; collabCtx.lineJoin = 'round'; collabCtx.lineWidth = 10; collabCtx.strokeStyle = '#ef4444';
        let cDraw = false; 
        const getXYCollab = e => { const rect = collabCanvas.getBoundingClientRect(); const cx = e.touches ? e.touches[0].clientX : e.clientX, cy = e.touches ? e.touches[0].clientY : e.clientY; return { x: (cx - rect.left) * (460 / rect.width), y: (cy - rect.top) * (460 / rect.height) }; };
        collabCanvas.onmousedown = collabCanvas.ontouchstart = e => { cDraw = true; const p = getXYCollab(e); collabCtx.beginPath(); collabCtx.moveTo(p.x, p.y); collabCtx.globalCompositeOperation = collabMode === 'eraser' ? 'destination-out' : 'source-over'; };
        collabCanvas.onmousemove = collabCanvas.ontouchmove = async e => { if(!cDraw) return; e.preventDefault(); const p = getXYCollab(e); collabCtx.lineTo(p.x, p.y); collabCtx.stroke(); if(collabMode === 'eraser' && collabTargetUid) { await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { eraseReq: arrayUnion({x: p.x*(500/460), y: p.y*(500/460)}) }); } };
        collabCanvas.onmouseup = collabCanvas.onmouseleave = collabCanvas.ontouchend = async () => { if(cDraw) { cDraw = false; collabHistory.push(collabCanvas.toDataURL()); if(collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { collabImage: collabCanvas.toDataURL() }); } };
    }

    window.setCollabMode = (m, c) => { collabMode = m; if(c) collabCtx.strokeStyle = c; document.querySelectorAll('.tc-tool').forEach(b => b.classList.toggle('tool-active', b.dataset.tool === (m === 'eraser' ? 'eraser' : (c === '#ef4444' ? 'red' : '#3b82f6')))); };
    window.undo = () => { if(!history.length || isLocked) return; history.pop(); const last = history[history.length-1]; ctx.clearRect(0,0,500,500); if(last){ const i = new Image(); i.onload = () => ctx.drawImage(i, 0,0,500,500); i.src = last; } autoUp(); };
    window.undoCollab = async () => { if(!collabHistory.length) return; collabHistory.pop(); const last = collabHistory[collabHistory.length-1]; collabCtx.clearRect(0,0,460,460); if(last){ const i = new Image(); i.onload = async () => { collabCtx.drawImage(i, 0,0,460,460); if(collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { collabImage: collabCanvas.toDataURL() }); }; i.src = last; } else { if(collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { collabImage: '' }); } };
    window.clearCanvas = () => { if(isLocked) return; ctx.clearRect(0,0,500,500); history = []; autoUp(); };
    window.clearCollabCanvas = async (sync = true) => { collabCtx.clearRect(0,0,460,460); collabHistory = []; if(sync && collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { collabImage: '' }); };
    window.adjustZoom = d => { zoom = Math.max(0.5, Math.min(2, zoom + d)); document.getElementById('zoom-wrapper').style.transform = `scale(${zoom})`; };
    async function autoUp() { if(!user || !stName) return; await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { name: stName, image: canvas.toDataURL('image/png', 0.2), ts: Date.now() }, { merge: true }); }
    
    window.showQRCode = () => {
        const url = window.location.href, b = document.createElement('div'); b.className = "fixed inset-0 z-[300] flex items-center justify-center bg-black/70 p-6"; b.onclick = (e) => { if(e.target === b) b.remove(); };
        b.innerHTML = `<div class="bg-white p-10 rounded-[40px] text-center shadow-2xl font-bold max-w-sm w-full"><h3 class="font-black text-2xl mb-4 text-indigo-700 italic">掃描連線碼</h3><div id="qrc" class="flex justify-center mb-6"></div><div class="bg-slate-50 p-4 rounded-2xl mb-6 font-bold"><div class="text-[10px] text-slate-400 mb-1">連線網址</div><div class="text-xs text-indigo-600 truncate mb-4 font-black font-bold">${url}</div><button id="copy-link-btn" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-black text-sm shadow-md active:scale-95 transition-all">📋 複製網址</button></div><p class="text-[10px] text-slate-400">點擊背景關閉</p></div>`;
        document.body.appendChild(b); new QRCode(document.getElementById('qrc'), { text: url, width: 200, height: 200 });
        document.getElementById('copy-link-btn').onclick = () => {
            const el = document.createElement('textarea'); el.value = url; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            const btn = document.getElementById('copy-link-btn'); btn.innerText = "✅ 已複製！"; setTimeout(() => btn.innerText = "📋 複製網址", 2000);
        };
    };

    const tb = document.getElementById('draggable-toolbar'); let isDragging = false, offset = { x: 0, y: 0 };
    const onStart = e => { isDragging = true; const cx = e.touches ? e.touches[0].clientX : e.clientX, cy = e.touches ? e.touches[0].clientY : e.clientY; offset.x = cx - tb.offsetLeft; offset.y = cy - tb.offsetTop; };
    const onMove = e => { if(!isDragging) return; e.preventDefault(); const cx = e.touches ? e.touches[0].clientX : e.clientX, cy = e.touches ? e.touches[0].clientY : e.clientY; tb.style.left = `${cx - offset.x}px`; tb.style.top = `${cy - offset.y}px`; tb.style.right = 'auto'; };
    tb.addEventListener('mousedown', onStart); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', () => isDragging = false);
    tb.addEventListener('touchstart', onStart, {passive:false}); window.addEventListener('touchmove', onMove, {passive:false}); window.addEventListener('touchend', () => isDragging = false);
</script>
</body>
</html>
