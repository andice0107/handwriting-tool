<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>漢字習寫系統 - 專業控制最終版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4338ca; --amber: #f59e0b; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; touch-action: none; overflow: hidden; height: 100dvh; }
        .kai-text { font-family: "KaiTi TC", "STKaiti", "BiauKai", "標楷體", "DFKai-SB", "Apple LiSung", serif; font-weight: bold; }
        .pop-font { font-weight: 900; letter-spacing: -1px; }

        .tian-grid-wrapper { transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); transform-origin: center center; }
        .tian-grid-container {
            width: 85vw; max-width: 500px; aspect-ratio: 1 / 1; position: relative;
            background-color: #fff; border-radius: 16px; overflow: hidden; border: 4px solid #f87171;
        }

        .tian-grid-bg::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; border-top: 2.5px dashed #fca5a5; z-index: 1; }
        .tian-grid-bg::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; border-left: 2.5px dashed #fca5a5; z-index: 1; }

        .btn-push { transition: all 0.1s; box-shadow: 0 4px 0 #1e1b4b; }
        .btn-push:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 1px 0 #1e1b4b; }
        
        #answer-overlay {
            pointer-events: none; opacity: 0; transition: opacity 0.4s; color: rgba(67, 56, 202, 0.14);
            display: flex; align-items: center; justify-content: center;
            z-index: 5; position: absolute; inset: 0; width: 100%; height: 100%; overflow: hidden; line-height: 1;
        }
        #answer-overlay.show { opacity: 1; }

        #teacher-collab-layer { position: absolute; inset: 0; z-index: 200; pointer-events: none; width: 100%; height: 100%; object-fit: contain; }
        canvas { position: absolute; inset: 0; z-index: 10; touch-action: none; cursor: crosshair; width: 100%; height: 100%; background: transparent; }

        #draggable-toolbar { position: fixed; right: 15px; top: 25%; z-index: 250; cursor: move; touch-action: none; user-select: none; width: 44px; padding: 12px 4px; }
        .zoom-controls { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 150; }
        
        #st-char-container {
            width: min(38vw, 450px); height: min(38vw, 450px);
            word-break: break-all; overflow-wrap: break-word; text-align: center;
            display: flex; align-items: center; justify-content: center; padding: 15px;
            background: #fff; border-radius: 40px; border: 4px solid #fde68a; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative;
        }
        #st-char { line-height: 1.1; width: 100%; transition: opacity 0.3s; z-index: 50; position: relative; display: none; font-weight: 900; }
        #st-waiting-msg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 40px; z-index: 40; color: #94a3b8; font-weight: 900; font-size: 26px; text-align: center; padding: 30px; }

        .monitor-card { background: white; border-radius: 32px; box-shadow: 0 15px 45px rgba(0,0,0,0.1); border: 2px solid #eef2f6; overflow: hidden; display: flex; flex-direction: column; width: 100%; min-height: 380px; flex-shrink: 0; aspect-ratio: 1/1; position: relative; }
        .monitor-header { background: #4338ca; color: white; padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .monitor-content-wrapper { position: relative; flex-grow: 1; width: 100%; height: 100%; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .monitor-mask { background: #f1f5f9; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-weight: 900; font-size: 20px; border-radius: 20px; border: 2px dashed #cbd5e1; position: absolute; inset: 15px; z-index: 10; text-align: center; }
        .monitor-img { width: 100%; height: 100%; object-fit: contain; display: block; padding: 10px; background: white; }
        
        #teacher-sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        .top-label { font-size: 14px; color: #94a3b8; font-weight: 900; text-transform: uppercase; margin-bottom: 3px; padding-left: 4px; }
        #teacher-preview-box { background: white; border: 2px solid #e2e8f0; border-radius: 12px; height: 52px; padding: 0 16px; display: flex; align-items: center; min-width: 180px; max-width: 350px; font-weight: 900; font-size: 18px; color: #4338ca; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        
        #display-join-code { font-size: 56px; line-height: 1; font-weight: 900; letter-spacing: -2px; color: #b45309; }

        .number-btn-v { width: 44px; height: 44px; border-radius: 12px; font-weight: 900; font-size: 24px; transition: all 0.2s; margin-bottom: 10px; flex-shrink: 0; }
        .number-btn-v.active { background-color: #4338ca; color: #fde68a; transform: scale(1.15); box-shadow: 0 4px 12px rgba(67, 56, 202, 0.3); }
        .number-btn-v.inactive { background-color: white; color: #94a3b8; border: 1px solid #e2e8f0; }
        .active-quiz-badge { background: #fde68a; color: #b45309; padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 900; margin-left: auto; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .tool-active { border: 4px solid #4338ca !important; transform: scale(1.1); box-shadow: 0 0 15px rgba(67, 56, 202, 0.4); }
    </style>
</head>
<body>

<div id="app" class="h-full flex flex-col">
    <!-- 1. 入口 -->
    <div id="mode-selector" class="absolute inset-0 z-[150] flex flex-col items-center justify-center bg-white p-6 font-bold">
        <h1 class="text-7xl md:text-9xl pop-font text-indigo-700 italic tracking-tighter mb-4 font-bold">漢字習寫系統</h1>
        <p class="text-3xl md:text-5xl font-black text-indigo-400 mb-24 tracking-widest italic font-bold font-bold font-bold font-bold">可以師生同步</p>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 w-full max-w-5xl">
            <button onclick="window.openAuthModal('teacher')" class="bg-indigo-600 text-white p-16 rounded-[60px] btn-push text-4xl font-black shadow-2xl transition-transform hover:scale-105 font-bold">👨‍🏫 教師主控</button>
            <button onclick="window.showNameInput()" class="bg-amber-500 text-white p-16 rounded-[60px] btn-push text-4xl font-black shadow-2xl transition-transform hover:scale-105 font-bold">👶 學生練習</button>
        </div>
    </div>

    <!-- 2. 教師密碼框 -->
    <div id="auth-modal" class="hidden absolute inset-0 z-[400] flex items-center justify-center bg-slate-900/90 backdrop-blur-xl p-6 font-bold">
        <div class="bg-white p-12 rounded-[60px] shadow-2xl w-full max-sm:max-w-sm text-center border-b-8 border-indigo-200">
            <h2 id="auth-title" class="text-3xl font-black mb-8 text-indigo-700 font-bold">管理員驗證</h2>
            <input type="password" id="admin-pw-input" class="w-full text-center text-5xl p-5 border-4 border-indigo-50 rounded-3xl mb-10 outline-none focus:border-indigo-500 font-bold" placeholder="••••••">
            <div class="flex gap-6">
                <button onclick="window.closeAuthModal()" class="flex-1 bg-slate-100 text-slate-500 py-5 rounded-3xl font-bold text-xl transition-colors hover:bg-slate-200">取消</button>
                <button id="auth-confirm-btn" class="flex-[2] bg-indigo-600 text-white py-5 rounded-3xl font-black text-2xl btn-push shadow-md font-bold font-bold">確認執行</button>
            </div>
        </div>
    </div>

    <!-- 3. 學生登入 -->
    <div id="name-modal" class="hidden absolute inset-0 z-[300] flex items-center justify-center bg-slate-900/90 backdrop-blur-xl p-6 font-bold">
        <div class="bg-white p-12 rounded-[60px] shadow-2xl w-full max-sm:max-w-sm text-center border-b-8 border-indigo-200">
            <h2 class="text-3xl font-black mb-8 text-indigo-700 font-bold">準備練習囉</h2>
            <div class="space-y-6 mb-10 font-bold">
                <input type="text" id="st-name-input" class="w-full text-center text-3xl p-5 border-4 border-indigo-50 rounded-3xl outline-none focus:border-indigo-500 font-bold" placeholder="姓名或座號">
                <input type="text" id="st-code-input" maxlength="6" class="w-full text-center text-5xl p-5 border-4 border-amber-100 rounded-3xl outline-none focus:border-amber-500 font-bold tracking-widest" placeholder="6 碼序號">
            </div>
            <button onclick="window.initApp('student')" class="w-full bg-indigo-600 text-white py-6 rounded-3xl font-black text-2xl btn-push shadow-md transition-transform hover:scale-[1.02] font-bold">驗證進入</button>
        </div>
    </div>

    <!-- 4. 教師主控台 -->
    <div id="teacher-view" class="hidden h-full flex flex-col bg-slate-50 font-bold">
        <header class="bg-white border-b px-6 py-5 flex justify-between items-center shrink-0 shadow-sm relative z-50">
            <div class="flex items-center gap-6">
                <button onclick="window.toggleSidebar()" class="bg-indigo-600 text-white px-5 py-3 rounded-2xl shadow-lg hover:bg-indigo-700 font-black text-base shrink-0 font-bold">題庫設定</button>
                <button onclick="window.openAuthModal('change')" class="bg-slate-100 text-slate-600 px-5 py-3 rounded-2xl font-black text-base hover:bg-slate-200 font-bold">🔑 修改密碼</button>
                <div class="flex flex-col bg-amber-50 border border-amber-200 px-6 py-1 rounded-2xl shrink-0 font-bold">
                    <span class="top-label text-amber-600 font-black font-bold font-bold font-bold font-bold">學生登入序號</span>
                    <span id="display-join-code">------</span>
                </div>
                <div class="flex flex-col gap-1 font-bold">
                   <span class="top-label text-slate-400 font-bold font-bold font-bold font-bold font-bold">學生目前預覽</span>
                   <div id="teacher-preview-box" class="truncate italic font-black text-indigo-600 font-bold">無題目</div>
                </div>
                <button id="global-action-btn" onclick="window.toggleGlobalAction()" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl shadow-xl font-black text-xl btn-push font-bold">開始作答</button>
                <div id="teacher-timer-box" class="flex flex-col bg-amber-50 border border-amber-200 px-5 py-2 rounded-2xl font-bold font-bold font-bold font-bold font-bold font-bold">
                    <div class="flex items-center gap-3">
                        <label class="text-sm font-black text-amber-700 uppercase font-bold">限時(秒)</label>
                        <input type="number" id="timer-duration" value="30" min="0" class="w-16 text-center text-lg font-black bg-white border border-amber-200 rounded-lg py-1">
                    </div>
                    <p class="text-[10px] text-amber-500 font-black mt-1 tracking-tighter italic font-bold">0秒代表時間無限</p>
                </div>
                <button onclick="window.showQRCode()" class="bg-indigo-50 text-indigo-700 px-5 py-3 rounded-xl shadow-sm text-sm font-black font-bold font-bold font-bold font-bold font-bold font-bold font-bold">📲 連線碼</button>
            </div>
            <div id="conn-count" class="bg-indigo-600 text-white px-8 py-3 rounded-full text-base font-black shadow-lg font-bold font-bold">在線: 0</div>
        </header>
        <main class="flex-grow flex overflow-hidden font-bold">
            <aside id="teacher-sidebar" class="bg-white border-r flex flex-col shrink-0 shadow-inner z-40 w-80 font-bold font-bold">
                <div id="sidebar-nav-vertical" class="hidden flex flex-col items-center py-8 gap-1 overflow-y-auto scrollbar-hide bg-slate-50 border-l border-slate-100"></div>
                <div id="sidebar-content" class="flex flex-col h-full font-bold">
                    <div class="p-8 border-b bg-slate-50 text-center font-bold">
                        <textarea id="data-input" class="w-full h-64 border-2 border-slate-100 rounded-3xl p-5 text-sm outline-none focus:border-indigo-500 font-bold font-bold" placeholder="生字：語詞"></textarea>
                        <button onclick="window.parseData()" class="w-full mt-6 bg-slate-800 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-black transition-all">同步內容並收起</button>
                    </div>
                    <div id="quiz-list-full" class="flex-grow overflow-y-auto p-5 space-y-4 bg-slate-50 font-bold font-bold font-bold"></div>
                </div>
            </aside>
            <section class="flex-grow p-10 overflow-y-auto bg-slate-100 font-bold">
                <div class="flex justify-between items-center mb-8 px-6 font-bold font-bold font-bold font-bold">
                    <h3 class="text-3xl font-black text-slate-800 underline decoration-amber-400 font-bold font-bold font-bold font-bold font-bold">實時監控牆</h3>
                    <button onclick="window.clearAllSubs()" class="text-sm font-black text-red-500 hover:underline">清空全班數據</button>
                </div>
                <div id="monitor-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-10 items-start font-bold"></div>
            </section>
        </main>
    </div>

    <!-- 5. 學生端 -->
    <div id="student-view" class="hidden h-full flex flex-col bg-[#fffefc] font-bold">
        <header class="bg-white border-b px-10 py-5 flex justify-between items-center shrink-0 shadow-md relative z-40 font-bold">
            <div class="flex flex-col">
                <div id="st-word" class="text-4xl font-black text-indigo-700 italic font-bold">漢字習寫</div>
                <div id="st-id-display" class="text-xs font-black text-indigo-300 italic">ID: ----</div>
            </div>
            <div class="flex gap-6 items-center">
                <div id="timer-display" class="hidden bg-amber-500 text-white px-8 py-3 rounded-3xl font-black text-3xl shadow-xl animate-pulse font-bold font-bold">⏱ <span id="timer-seconds">--</span>s</div>
                <div id="reveal-status" class="bg-indigo-50 text-indigo-400 px-6 py-3 rounded-2xl font-black text-base border border-indigo-100 flex items-center gap-3">
                    <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75 font-bold font-bold"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-indigo-500 font-bold font-bold font-bold font-bold font-bold font-bold font-bold"></span></span>狀態載入中...
                </div>
                <button onclick="window.studentQuit()" class="bg-red-50 text-red-500 px-8 py-3 rounded-2xl font-black text-base border border-red-100 shadow-sm font-bold font-bold">🚪 退出</button>
            </div>
        </header>
        <main class="flex-grow flex items-center justify-start p-10 md:p-16 relative overflow-hidden font-bold">
            <div id="st-char-container" class="shrink-0 font-bold">
                <div id="st-waiting-msg" class="font-bold">等待老師開啟題目</div>
                <div id="st-char" class="kai-text text-slate-800 leading-none font-black text-center hidden">?</div>
            </div>
            <div class="flex-grow flex items-center justify-center font-bold">
                <div id="zoom-wrapper" class="tian-grid-wrapper font-bold font-bold">
                    <div class="tian-grid-container shadow-2xl font-bold font-bold font-bold">
                        <div class="tian-grid-bg absolute inset-0 font-bold font-bold font-bold font-bold font-bold"></div>
                        <div id="answer-overlay" class="kai-text font-bold font-bold font-bold font-bold"></div>
                        <img id="teacher-collab-layer" class="hidden font-bold">
                        <canvas id="main-canvas"></canvas>
                    </div>
                </div>
            </div>
            <div id="draggable-toolbar" class="bg-white/95 backdrop-blur-md rounded-[30px] shadow-2xl flex flex-col items-center gap-5 border border-indigo-50 font-bold">
                <div class="w-8 h-2 bg-slate-200 rounded-full mt-2.5 opacity-50 font-bold font-bold"></div>
                <div class="flex flex-col gap-4 font-bold" id="st-tools font-bold">
                    <button onclick="window.setStudentMode('pen')" class="st-btn w-11 h-11 rounded-xl bg-black border-2 border-white shadow-md tool-active font-bold" id="st-pen-btn"></button>
                    <button onclick="window.setStudentMode('eraser')" id="st-eraser-btn" class="st-btn w-11 h-11 rounded-xl bg-white border-2 border-slate-100 flex items-center justify-center text-2xl shadow-sm font-bold font-bold">🧽</button>
                </div>
                <div class="flex flex-col gap-4 border-t border-slate-100 pt-5 font-bold font-bold font-bold font-bold">
                    <button onclick="window.undo()" class="st-btn bg-amber-100 text-amber-700 w-11 h-11 rounded-xl font-black text-xl flex items-center justify-center active:scale-90 shadow-sm font-bold font-bold">↩</button>
                    <button onclick="window.clearCanvas()" class="st-btn bg-slate-100 text-slate-600 w-11 h-11 rounded-xl font-black text-xl flex items-center justify-center active:scale-90 shadow-sm font-bold font-bold">🧹</button>
                </div>
            </div>
            <!-- 恢復縮放按鈕 -->
            <div class="zoom-controls font-bold font-bold font-bold">
                <button onclick="window.adjustZoom(0.1)" class="w-16 h-16 bg-white rounded-full shadow-2xl border border-indigo-50 flex items-center justify-center text-4xl font-black text-indigo-600 active:scale-90 font-bold font-bold">+</button>
                <button onclick="window.adjustZoom(-0.1)" class="w-16 h-16 bg-white rounded-full shadow-xl border border-indigo-100 flex items-center justify-center text-4xl font-black text-indigo-600 active:scale-90 font-bold font-bold">-</button>
            </div>
        </main>
    </div>

    <!-- 6. 協作視窗 (物理全域焊接) -->
    <div id="collab-modal" class="hidden fixed inset-0 z-[600] flex items-center justify-center bg-slate-900/85 p-6 font-bold">
        <div class="bg-white w-full max-w-5xl rounded-[60px] shadow-2xl flex flex-col overflow-hidden max-h-[95vh] font-bold">
            <header class="p-8 bg-indigo-600 text-white flex justify-between items-center shrink-0 font-bold">
                <div class="flex items-center gap-8 font-bold font-bold font-bold">
                    <div><h3 class="text-3xl font-black italic" id="collab-st-title font-bold">師生同步協作</h3><p class="text-xs opacity-80 font-black">教師筆劃物理覆蓋</p></div>
                    <div class="bg-indigo-700/50 px-6 py-3 rounded-3xl flex items-center gap-3 border border-white/20 font-bold font-bold font-bold font-bold">
                        <input type="checkbox" id="collab-lock-student" onchange="window.syncStudentForceLock()" class="w-6 h-6 accent-indigo-400">
                        <label class="text-sm font-black font-bold font-bold font-bold">🔒 鎖定學生操作</label>
                    </div>
                </div>
                <div class="flex gap-4 font-bold font-bold font-bold">
                    <button onclick="window.clearStudentRemote()" class="bg-amber-500 hover:bg-amber-600 px-8 py-3 rounded-2xl font-black shadow-xl transition-all font-bold">👤 全清該生</button>
                    <button onclick="window.closeCollab()" class="bg-white/20 px-8 py-3 rounded-2xl font-black border border-white/30 font-bold font-bold">關閉</button>
                </div>
            </header>
            <main class="flex-grow flex flex-col md:flex-row p-10 gap-12 items-center justify-center bg-slate-50 overflow-y-auto font-bold font-bold">
                <div id="collab-canvas-container" class="relative bg-white shadow-2xl rounded-3xl overflow-hidden border-8 border-indigo-200 shrink-0 font-bold font-bold" style="width: 500px; height: 500px;">
                    <img id="collab-st-preview" class="absolute inset-0 z-10 w-full h-full object-contain pointer-events-none opacity-40 font-bold font-bold font-bold">
                    <canvas id="collab-canvas" class="relative z-20 w-full h-full font-bold font-bold"></canvas>
                </div>
                <div class="flex flex-col gap-6 font-bold font-bold font-bold font-bold">
                    <button onclick="window.setCollabMode('red')" class="tc-tool w-16 h-16 rounded-3xl bg-red-500 border-4 border-white shadow-xl tool-active font-bold" data-tool="red"></button>
                    <button onclick="window.setCollabMode('blue')" class="tc-tool w-16 h-16 rounded-3xl bg-blue-500 border-4 border-white shadow-xl font-bold font-bold font-bold" data-tool="blue"></button>
                    <button onclick="window.setCollabMode('eraser')" class="tc-tool w-16 h-16 rounded-3xl bg-white border-4 border-white shadow-xl flex items-center justify-center text-4xl" data-tool="eraser">🧽</button>
                    <div class="border-t pt-6 flex flex-col gap-6 font-bold font-bold font-bold font-bold">
                        <button onclick="window.undoCollab()" class="w-16 h-16 rounded-3xl bg-indigo-50 text-indigo-700 shadow-lg text-3xl font-bold">↩</button>
                        <button onclick="window.clearCollabCanvas()" class="w-16 h-16 rounded-3xl bg-slate-100 text-slate-600 shadow-lg text-2xl font-bold font-bold font-bold">🧹</button>
                    </div>
                </div>
            </main>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, deleteDoc, updateDoc, arrayUnion, getDocs } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyBBIi6sw-wUzp-Jxc3dXJhl5DZ3-6LMe-o", authDomain: "my-handwriting-tool.firebaseapp.com", projectId: "my-handwriting-tool", storageBucket: "my-handwriting-tool.firebasestorage.app", messagingSenderId: "649810632937", appId: "1:649810632937:web:085f7e5c8f5290d6da9078" };
    const app = initializeApp(firebaseConfig), db = getFirestore(app), auth = getAuth(app);
    // 頻道物理鎖定
    const ID = "ice-hanzi-privacy-vFinal-Locked-vUltimate-2026-FINAL-PRO-REFIX-V20-FINAL-PHYSICAL-LOCK"; 
    let user = null, quizData = [], curIdx = -1, stName = '', collabTargetUid = null, isLocked = true, isSidebarCollapsed = true;
    let submissionsData = [], visibleUids = new Set(), currentJoinCode = "", collabMode = 'red', authType = 'teacher', zoom = 1.0;

    onAuthStateChanged(auth, async u => { user = u; if(!u) { const res = await signInAnonymously(auth); user = res.user; } });

    // --- 全域物理焊接核心 (解決 Enter 鍵、協作 🤝 與 onclick 失效) ---
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            const adminInput = document.getElementById('admin-pw-input'), stNameInput = document.getElementById('st-name-input'), stCodeInput = document.getElementById('st-code-input');
            if (adminInput === document.activeElement) document.getElementById('auth-confirm-btn').click();
            if (stNameInput === document.activeElement) stCodeInput.focus();
            if (stCodeInput === document.activeElement) window.initApp('student');
        }
    });

    window.showNameInput = () => document.getElementById('name-modal').classList.remove('hidden');
    window.openAuthModal = (type) => {
        authType = type; const m = document.getElementById('auth-modal');
        document.getElementById('admin-pw-input').value = ""; m.classList.remove('hidden');
        document.getElementById('auth-title').innerText = type === 'teacher' ? "管理員驗證" : "修改管理密碼";
    };
    window.closeAuthModal = () => document.getElementById('auth-modal').classList.add('hidden');

    document.getElementById('auth-confirm-btn').onclick = async () => {
        if(!user) await signInAnonymously(auth);
        const val = document.getElementById('admin-pw-input').value.trim(); if(!val) return;
        if(authType === 'teacher'){
            const s = await getDoc(doc(db, 'artifacts', ID, 'public', 'data', 'config', 'admin'));
            const actualPw = s.exists() ? s.data().adminPassword : "ice888";
            if(val === actualPw) { window.closeAuthModal(); window.initApp('teacher'); } else alert("密碼錯誤");
        } else {
            await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'config', 'admin'), { adminPassword: val }, { merge: true });
            alert("修改成功。"); window.closeAuthModal();
        }
    };

    // --- 學生/協作啟動器方案 ---
    window.initApp = async (role) => {
        if(!auth.currentUser) { const res = await signInAnonymously(auth); user = res.user; } else { user = auth.currentUser; }
        if(role === 'student'){
            const codeInput = document.getElementById('st-code-input').value.trim();
            const serverDoc = await getDoc(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'));
            const serverCode = serverDoc.data()?.joinCode;
            if(!serverCode) { alert("教師尚未同步內容"); return; }
            if(codeInput !== serverCode) { alert(`序號錯誤！目前序號為：${serverCode}`); return; }
            stName = document.getElementById('st-name-input').value.trim() || `學員-${Math.random().toString(36).substring(2,6).toUpperCase()}`;
            document.getElementById('st-id-display').innerText = `ID: ${stName}`;
            document.getElementById('name-modal').classList.add('hidden');
            await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { name: stName, image: '', ts: Date.now(), collabImage: '', clearReq: false, eraseReq: [], forceLocked: false });
        }
        document.getElementById('mode-selector').classList.add('hidden');
        if(role === 'teacher') setupTeacher(); else setupStudent();
    };

    window.openCollab = function(uid, name, locked) { 
        collabTargetUid = uid; 
        document.getElementById('collab-st-title').innerText = `與 ${name} 協作中`; 
        document.getElementById('collab-lock-student').checked = !!locked;
        const target = submissionsData.find(s => s.id === uid);
        document.getElementById('collab-st-preview').src = target ? target.image : '';
        document.getElementById('collab-modal').classList.remove('hidden'); 
        setTimeout(() => window.initCollabDrawing(), 300);
    };
    window.closeCollab = () => { collabTargetUid = null; document.getElementById('collab-modal').classList.add('hidden'); };
    window.clearStudentRemote = async () => { if(collabTargetUid) { await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { clearReq: true, image: '' }); document.getElementById('collab-st-preview').src = ''; } };
    window.syncStudentForceLock = async () => { if(collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { forceLocked: document.getElementById('collab-lock-student').checked }); };

    window.toggleSidebar = () => {
        isSidebarCollapsed = !isSidebarCollapsed;
        const sidebar = document.getElementById('teacher-sidebar'), content = document.getElementById('sidebar-content'), verticalNav = document.getElementById('sidebar-nav-vertical');
        sidebar.style.width = isSidebarCollapsed ? '60px' : '320px';
        content.classList.toggle('hidden', isSidebarCollapsed);
        verticalNav.classList.toggle('hidden', !isSidebarCollapsed);
        renderNav(); 
    };

    window.toggleGlobalAction = async () => {
        const stateRef = doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current');
        const s = await getDoc(stateRef);
        const d = s.data() || {};
        if (!d.isStarted || d.isPaused) {
            const dur = parseInt(document.getElementById('timer-duration').value) || 0;
            const endTime = dur > 0 ? Date.now() + (dur * 1000) : 0;
            await setDoc(stateRef, { isStarted: true, isPaused: false, timerEndTime: endTime }, { merge: true });
        } else { await setDoc(stateRef, { isPaused: true }, { merge: true }); }
    };

    async function setupTeacher() {
        document.getElementById('teacher-view').classList.remove('hidden');
        document.getElementById('data-input').value = "簽：簽名\n遞：遞給\n傻：傻瓜\n瓜：西瓜\n痺：麻痺\n患：患者\n握：握手\n艱：艱難\n聆：聆聽\n埋：埋怨\n雷：打雷\n符：符號"; 
        const sRef = doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current');
        currentJoinCode = Math.floor(100000 + Math.random() * 900000).toString();
        document.getElementById('display-join-code').innerText = currentJoinCode;
        await setDoc(sRef, { joinCode: currentJoinCode, isPaused: true, isStarted: false, timerEndTime: 0 }, { merge: true });
        parseData(); 
        onSnapshot(collection(db, 'artifacts', ID, 'public', 'data', 'submissions'), snap => {
            submissionsData = []; snap.forEach(d => submissionsData.push({ id: d.id, ...d.data() }));
            document.getElementById('conn-count').innerText = `在線: ${snap.size}`;
            window.renderMonitorGrid();
        });
        onSnapshot(sRef, snap => {
            if(snap.exists()){
                const d = snap.data(); document.getElementById('app').dataset.gs = JSON.stringify(d);
                if(d.data) quizData = d.data; curIdx = d.idx || 0;
                renderNav(); 
                if(d.data && d.idx !== undefined) {
                    const i = d.data[d.idx];
                    if(i) document.getElementById('teacher-preview-box').innerText = i.context.split(i.target).join('□');
                }
                const actBtn = document.getElementById('global-action-btn');
                if(!d.isStarted || d.isPaused) { actBtn.innerText = "開始作答"; actBtn.className = "bg-indigo-600 text-white px-10 py-4 rounded-2xl shadow-xl font-black text-xl btn-push font-bold"; }
                else { actBtn.innerText = "停止作答"; actBtn.className = "bg-red-500 text-white px-10 py-4 rounded-2xl shadow-xl font-black text-xl btn-push font-bold"; }
            }
        });
    }

    window.renderMonitorGrid = function() {
        const grid = document.getElementById('monitor-grid'); grid.innerHTML = '';
        submissionsData.forEach(data => {
            const isVisible = visibleUids.has(data.id);
            const card = document.createElement('div');
            card.className = "monitor-card font-bold";
            card.innerHTML = `<div class="monitor-header font-black text-[12px]"><span>${data.name}</span><div class="flex gap-2">
                <button onclick="window.toggleMask('${data.id}')" class="bg-white/20 w-6 h-6 rounded flex items-center justify-center text-[14px]">${isVisible?'👁️':'👁️‍🗨️'}</button>
                <button onclick="window.openCollab('${data.id}', '${data.name}', ${data.forceLocked})" class="bg-white/20 px-1 rounded-md text-[11px] font-black font-bold font-bold font-bold font-bold">🤝</button>
                <button onclick="window.deleteOneStudent('${data.id}')" class="bg-red-500 w-6 h-6 rounded-full flex items-center justify-center text-[16px]">×</button>
            </div></div><div class="monitor-content-wrapper">${!isVisible ? '<div class="monitor-mask font-bold font-bold font-bold">內容隱藏</div>' : `<img src="${data.image || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'}" class="monitor-img">`}</div>`;
            grid.appendChild(card);
            if(collabTargetUid === data.id) document.getElementById('collab-st-preview').src = data.image;
        });
    }

    window.toggleMask = uid => { if(visibleUids.has(uid)) visibleUids.delete(uid); else visibleUids.add(uid); window.renderMonitorGrid(); };
    window.clearAllSubs = async () => { if(confirm("確定清空全班？")) { const snap = await getDocs(collection(db, 'artifacts', ID, 'public', 'data', 'submissions')); snap.forEach(d => deleteDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', d.id))); } };
    window.deleteOneStudent = async uid => { if(confirm("移除此生？")) await deleteDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', uid)); };

    window.parseData = () => { 
        quizData = document.getElementById('data-input').value.split('\n').map(l => { const p = l.split(/[：:]/); return { target: p[0]?.trim() || '', context: p[1]?.trim() || '' }; }).filter(i => i.target !== ''); 
        renderNav(); syncGlobal({ data: quizData, idx: 0, ts: Date.now(), showAnswer: false, isPaused: true, isStarted: false }); 
    };

    function renderNav() { 
        const navFull = document.getElementById('quiz-list-full'), navV = document.getElementById('sidebar-nav-vertical');
        navFull.innerHTML = quizData.map((it, idx) => `<button onclick="window.setQuiz(${idx})" class="w-full text-left p-5 rounded-3xl border-2 transition-all flex justify-between items-center ${curIdx === idx ? 'border-indigo-600 bg-indigo-50 shadow-md font-black' : 'border-white bg-white shadow-sm'}" data-idx="${idx}"><span class="kai-text text-xl font-bold font-bold font-bold font-bold font-bold">${it.target}</span>${curIdx === idx ? '<span class="active-quiz-badge">正在出題</span>' : `<span class="text-[11px] text-slate-300 font-black italic"># ${idx+1}</span>`}</button>`).join('');
        navV.innerHTML = quizData.map((it, idx) => `<button onclick="window.setQuiz(${idx})" class="number-btn-v flex items-center justify-center ${curIdx === idx ? 'active' : 'inactive'} font-bold font-bold">${idx+1}</button>`).join('');
    }

    window.setQuiz = async idx => { curIdx = idx; syncGlobal({ idx, ts: Date.now(), showAnswer: false }); };
    async function syncGlobal(p) { await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), { ...p }, { merge: true }); }

    // --- 畫板焊接 (↩/🧹/Zoom) ---
    let studentCtx = null, studentHistory = [], studentMode = 'pen';
    window.clearCanvas = async () => { if(!studentCtx) return; studentCtx.clearRect(0,0,500,500); studentHistory = []; await autoUp(); };
    window.undo = async () => { if(!studentCtx || studentHistory.length === 0) return; studentHistory.pop(); const last = studentHistory[studentHistory.length-1]; studentCtx.clearRect(0,0,500,500); if(last){ const img = new Image(); img.onload = () => studentCtx.drawImage(img, 0,0,500,500); img.src = last; } await autoUp(); };
    window.setStudentMode = (m) => { if(isLocked) return; studentMode = m; document.getElementById('st-eraser-btn').classList.toggle('tool-active', m === 'eraser'); document.getElementById('st-pen-btn').classList.toggle('tool-active', m === 'pen'); };
    window.studentQuit = async () => { if(confirm("確定退出？紀錄將刪除。")) { if(user) await deleteDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid)); location.reload(); } };
    window.adjustZoom = d => { zoom = Math.max(0.5, Math.min(2, zoom + d)); document.getElementById('zoom-wrapper').style.transform = `scale(${zoom})`; };

    function setupStudent() {
        document.getElementById('student-view').classList.remove('hidden');
        const sCanvas = document.getElementById('main-canvas'); studentCtx = sCanvas.getContext('2d');
        const reset = () => { sCanvas.width = 500; sCanvas.height = 500; studentCtx.lineCap = 'round'; studentCtx.lineJoin = 'round'; studentCtx.lineWidth = 14; studentCtx.strokeStyle = '#000000'; };
        reset(); window.addEventListener('resize', reset);
        const getXY = e => { const r = sCanvas.getBoundingClientRect(); const cx = (e.touches ? e.touches[0].clientX : e.clientX), cy = (e.touches ? e.touches[0].clientY : e.clientY); return { x: (cx - r.left) * (500 / r.width), y: (cy - r.top) * (500 / r.height) }; };
        let drawing = false, timerInt = null;
        sCanvas.onmousedown = sCanvas.ontouchstart = e => { if(isLocked) return; drawing = true; const p = getXY(e); studentCtx.beginPath(); studentCtx.moveTo(p.x, p.y); studentCtx.globalCompositeOperation = studentMode === 'eraser' ? 'destination-out' : 'source-over'; studentCtx.strokeStyle = '#000000'; };
        sCanvas.onmousemove = sCanvas.ontouchmove = e => { if(!drawing || isLocked) return; if(e.cancelable) e.preventDefault(); const p = getXY(e); studentCtx.lineTo(p.x, p.y); studentCtx.stroke(); };
        window.onmouseup = window.ontouchend = () => { if(drawing) { drawing = false; studentHistory.push(sCanvas.toDataURL()); autoUp(); } };

        onSnapshot(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), s => {
            if(!s.exists()) return;
            const d = s.data(), layer = document.getElementById('teacher-collab-layer');
            if(d.collabImage) { layer.src = d.collabImage; layer.classList.remove('hidden'); } else layer.classList.add('hidden');
            if(d.clearReq) { studentCtx.clearRect(0,0,500,500); updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { clearReq: false, image: '' }); }
            if(d.eraseReq?.length) { studentCtx.globalCompositeOperation = 'destination-out'; d.eraseReq.forEach(p => { studentCtx.beginPath(); studentCtx.arc(p.x, p.y, 45, 0, Math.PI*2); studentCtx.fill(); }); studentCtx.globalCompositeOperation = 'source-over'; updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { eraseReq: [] }); autoUp(); }
            checkTotalLock(d.forceLocked);
        });

        onSnapshot(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), s => {
            if(s.exists()){
                const d = s.data(); document.getElementById('app').dataset.gs = JSON.stringify(d);
                if(d.data) quizData = d.data; const nIdx = d.idx || 0;
                const i = quizData[nIdx] || { target: '?', context: '' };
                const charEl = document.getElementById('st-char'); charEl.innerText = i.context.split(i.target).join('□');
                const updateFontSize = () => { 
                    let size = 220; charEl.style.fontSize = size + 'px'; 
                    const cont = document.getElementById('st-char-container'); 
                    while ((charEl.scrollHeight > cont.clientHeight || charEl.scrollWidth > cont.clientWidth) && size > 40) { 
                        size -= 10; charEl.style.fontSize = size + 'px'; 
                    } 
                }; setTimeout(updateFontSize, 50);
                document.getElementById('answer-overlay').innerText = i.target;
                document.getElementById('answer-overlay').classList.toggle('show', !!d.showAnswer);
                clearInterval(timerInt); const timerWrap = document.getElementById('timer-display');
                if(d.isStarted && !d.isPaused && d.timerEndTime > 0) {
                    timerWrap.classList.remove('hidden');
                    const updateTimer = () => { const rem = Math.max(0, Math.ceil((d.timerEndTime - Date.now())/1000)); document.getElementById('timer-seconds').innerText = rem; if(rem <= 0) { clearInterval(timerInt); checkTotalLock(); } };
                    timerInt = setInterval(updateTimer, 500); updateTimer();
                } else timerWrap.classList.add('hidden');
                checkTotalLock();
            }
        });
    }

    const checkTotalLock = (fl) => {
        const gsStr = document.getElementById('app').dataset.gs; if(!gsStr) return;
        const d = JSON.parse(gsStr);
        let timeUp = d.timerEndTime > 0 && Date.now() >= d.timerEndTime;
        let locked = d.isPaused || d.showAnswer || fl || !d.isStarted || timeUp;
        isLocked = locked;
        document.querySelectorAll('.st-btn').forEach(b => b.classList.toggle('locked-tool', locked));
        const statusEl = document.getElementById('reveal-status');
        if(statusEl) statusEl.innerText = !d.isStarted ? "⏸ 等待開啟" : (d.showAnswer ? "✨ 對照解答中" : (fl ? "🔒 已鎖定" : (timeUp ? "🔒 限時結束" : "作答中...")));
        const waitingMsg = document.getElementById('st-waiting-msg'), charEl = document.getElementById('st-char');
        if(!d.isStarted) { waitingMsg.style.display = 'flex'; charEl.style.display = 'none'; } else { waitingMsg.style.display = 'none'; charEl.style.display = 'block'; charEl.style.opacity = '1'; }
    };

    window.initCollabDrawing = function() {
        const cCanvas = document.getElementById('collab-canvas'); if(!cCanvas) return;
        const cCtx = cCanvas.getContext('2d'); cCanvas.width = 500; cCanvas.height = 500;
        cCtx.lineCap = 'round'; cCtx.lineJoin = 'round'; cCtx.lineWidth = 14; cCtx.strokeStyle = '#ef4444';
        let cDraw = false; 
        const getXYC = e => { const r = cCanvas.getBoundingClientRect(); const cx = (e.touches ? e.touches[0].clientX : e.clientX), cy = (e.touches ? e.touches[0].clientY : e.clientY); return { x: (cx - r.left) * (500 / r.width), y: (cy - r.top) * (500 / r.height) }; };
        cCanvas.onmousedown = cCanvas.ontouchstart = e => { cDraw = true; const p = getXYC(e); cCtx.beginPath(); cCtx.moveTo(p.x, p.y); cCtx.globalCompositeOperation = collabMode === 'eraser' ? 'destination-out' : 'source-over'; cCtx.strokeStyle = (collabMode === 'blue') ? '#3b82f6' : '#ef4444'; if(e.cancelable) e.preventDefault(); };
        cCanvas.onmousemove = cCanvas.ontouchmove = async e => { if(!cDraw) return; const p = getXYC(e); cCtx.lineTo(p.x, p.y); cCtx.stroke(); if(collabMode === 'eraser' && collabTargetUid) { await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { eraseReq: arrayUnion({x: p.x, y: p.y}) }); } if(e.cancelable) e.preventDefault(); };
        cCanvas.onmouseup = cCanvas.onmouseleave = cCanvas.ontouchend = async () => { if(cDraw) { cDraw = false; if(collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { collabImage: cCanvas.toDataURL() }); } };
        window.setCollabMode = (m) => { collabMode = m; document.querySelectorAll('.tc-tool').forEach(b => b.classList.toggle('tool-active', b.dataset.tool === m)); };
        window.clearCollabCanvas = async (sync = true) => { cCtx.clearRect(0,0,500,500); if(sync && collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { collabImage: '' }); };
        window.undoCollab = async () => { if(collabTargetUid) { await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { collabImage: '' }); cCtx.clearRect(0,0,500,500); } };
    }

    async function autoUp() { if(!user || !stName) return; const can = document.getElementById('main-canvas'); if(can) { const image = can.toDataURL('image/png', 0.2); await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { name: stName, image, ts: Date.now() }, { merge: true }); } }
    
    window.showQRCode = () => {
        const url = window.location.href, box = document.createElement('div');
        box.className = "fixed inset-0 z-[600] flex items-center justify-center bg-black/70 p-6"; box.onclick = (e) => { if(e.target === box) box.remove(); };
        box.innerHTML = `<div class="bg-white p-12 rounded-[60px] text-center shadow-2xl font-bold max-sm:w-full font-bold font-bold font-bold font-bold font-bold font-bold"><h3 class="font-black text-3xl mb-6 text-indigo-700 italic font-bold font-bold font-bold font-bold">連線 QR 碼與網址</h3><div id="qrc-container" class="flex justify-center mb-8 font-bold"></div><div class="bg-slate-50 p-6 rounded-3xl mb-8 font-bold font-bold font-bold font-bold"><div class="text-[12px] text-slate-400 mb-2 font-black uppercase font-bold font-bold font-bold">目前的連線網址</div><div id="url-text" class="text-sm text-indigo-600 truncate mb-6 font-black font-bold font-bold font-bold font-bold font-bold">${url}</div><button id="copy-link-btn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">📋 複製網址連結</button></div><p class="text-sm text-slate-400 font-black">點擊背景關閉視窗</p></div>`;
        document.body.appendChild(box); new QRCode(document.getElementById('qrc-container'), { text: url, width: 250, height: 250 });
        document.getElementById('copy-link-btn').onclick = () => { const el = document.createElement('textarea'); el.value = url; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); const btn = document.getElementById('copy-link-btn'); btn.innerText = "✅ 網址已複製！"; setTimeout(() => btn.innerText = "📋 複製網址連結", 2000); };
    };

    const tb = document.getElementById('draggable-toolbar'); let isDragging = false, offset = { x: 0, y: 0 };
    const onStart = e => { isDragging = true; const cx = (e.touches ? e.touches[0].clientX : e.clientX), cy = (e.touches ? e.touches[0].clientY : e.clientY); offset.x = cx - tb.offsetLeft; offset.y = cy - tb.offsetTop; };
    const onMove = e => { if(!isDragging) return; if(e.cancelable) e.preventDefault(); const cx = (e.touches ? e.touches[0].clientX : e.clientX), cy = (e.touches ? e.touches[0].clientY : e.clientY); tb.style.left = `${cx - offset.x}px`; tb.style.top = `${cy - offset.y}px`; tb.style.right = 'auto'; };
    tb.addEventListener('mousedown', onStart); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', () => isDragging = false);
    tb.addEventListener('touchstart', onStart, {passive:false}); window.addEventListener('touchmove', onMove, {passive:false}); window.addEventListener('touchend', () => isDragging = false);
</script>
</body>
</html>
