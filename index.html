<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>漢字習寫系統 - 可師生雙向同步</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4338ca; --amber: #f59e0b; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; touch-action: none; overflow: hidden; height: 100dvh; }
        
        .kai-text { font-family: "KaiTi TC", "STKaiti", "BiauKai", "標楷體", "DFKai-SB", "Apple LiSung", serif; font-weight: bold; }
        .pop-font { font-weight: 900; letter-spacing: -1px; }

        .tian-grid-wrapper { transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); transform-origin: center center; }
        .tian-grid-container {
            width: 85vw; max-width: 500px; aspect-ratio: 1 / 1; position: relative;
            background-color: #fff; border-radius: 16px; overflow: hidden; border: 4px solid #f87171;
        }

        .tian-grid-bg::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; border-top: 2.5px dashed #fca5a5; z-index: 1; height: 0; }
        .tian-grid-bg::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; border-left: 2.5px dashed #fca5a5; z-index: 1; width: 0; }

        .btn-push { transition: all 0.1s; box-shadow: 0 4px 0 #1e1b4b; }
        .btn-push:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 1px 0 #1e1b4b; }
        .btn-push:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); box-shadow: none; transform: none; }
        
        #answer-overlay {
            pointer-events: none; opacity: 0; transition: opacity 0.4s; color: rgba(67, 56, 202, 0.14);
            display: flex; align-items: center; justify-content: center;
            z-index: 5; position: absolute; inset: 0; width: 100%; height: 100%; overflow: hidden; line-height: 1;
        }
        #answer-overlay.show { opacity: 1; }

        #teacher-collab-layer { position: absolute; inset: 0; z-index: 7; pointer-events: none; width: 100%; height: 100%; object-fit: contain; }
        canvas { position: absolute; inset: 0; z-index: 10; touch-action: none; cursor: crosshair; width: 100%; height: 100%; background: transparent; }

        #draggable-toolbar {
            position: fixed; right: 15px; top: 25%; z-index: 200; cursor: move; touch-action: none; user-select: none;
            width: 44px; padding: 12px 4px;
        }

        .zoom-controls { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 150; }
        
        #st-char-container {
            width: min(38vw, 420px); height: min(38vw, 420px);
            word-break: break-all; overflow-wrap: break-word; text-align: center;
            display: flex; align-items: center; justify-content: center; padding: 25px;
            background: #fff; border-radius: 40px; border: 4px solid #fde68a; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative;
        }
        #st-char { line-height: 1.15; width: 100%; transition: opacity 0.3s; }
        #st-waiting-msg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 40px; z-index: 20; color: #94a3b8; font-weight: 900; font-size: 24px; text-align: center; padding: 20px; }

        #collab-modal, #auth-modal, #info-modal { backdrop-filter: blur(15px); }
        .locked-tool { filter: grayscale(1); opacity: 0.3 !important; pointer-events: none; transition: all 0.3s; }

        .tooltip-box { display: none; position: absolute; top: 60px; left: 0; width: 300px; background: white; border: 2px solid #4338ca; border-radius: 20px; padding: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); z-index: 100; text-align: left; }
        .info-btn:hover .tooltip-box { display: block; }

        #teacher-sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        #sidebar-content { width: 320px; height: 100%; transition: opacity 0.2s; }
        #sidebar-nav-vertical { width: 60px; height: 100%; transition: opacity 0.2s; }
        .number-btn-v { transition: all 0.2s; width: 44px; height: 44px; flex-shrink: 0; }
        .number-btn-v.active { background-color: #4338ca; color: white; transform: scale(1.05); border-radius: 12px; }

        .monitor-mask { background: #f1f5f9; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-weight: bold; font-size: 14px; text-align: center; border-radius: 20px; border: 1px dashed #cbd5e1; position: absolute; inset: 0; z-index: 10; }
        #teacher-preview-box { background: white; border: 2px solid #e2e8f0; border-radius: 12px; height: 44px; padding: 0 16px; display: flex; align-items: center; min-width: 140px; max-width: 300px; font-weight: 900; }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

<div id="app" class="h-full flex flex-col">
    <!-- 1. 入口模式 -->
    <div id="mode-selector" class="absolute inset-0 z-[250] flex flex-col items-center justify-center bg-white p-6">
        <div class="text-center mb-20">
            <h1 class="text-7xl md:text-9xl pop-font text-indigo-700 italic tracking-tighter font-black">漢字習寫系統</h1>
            <p class="text-3xl md:text-4xl font-bold text-indigo-400 mt-4 tracking-widest italic font-black">可師生雙向同步</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 w-full max-w-4xl px-4">
            <button onclick="openAuthModal('teacher')" class="bg-indigo-600 text-white p-14 rounded-[60px] btn-push text-4xl font-black flex flex-col items-center shadow-xl">
                <span class="text-7xl mb-6">👨‍🏫</span>教師主控
            </button>
            <button onclick="window.showNameInput()" class="bg-amber-500 text-white p-14 rounded-[60px] btn-push text-4xl font-black flex flex-col items-center shadow-xl">
                <span class="text-7xl mb-6 font-bold">👶</span>學生練習
            </button>
        </div>
    </div>

    <!-- 2. 密碼驗證框 -->
    <div id="auth-modal" class="hidden absolute inset-0 z-[300] flex items-center justify-center bg-slate-900/90 backdrop-blur-xl p-6">
        <div class="bg-white p-12 rounded-[60px] shadow-2xl w-full max-w-sm text-center border-b-8 border-indigo-200">
            <h2 id="auth-title" class="text-3xl font-black mb-8 text-indigo-700 font-bold">驗證身分</h2>
            <input type="password" id="admin-pw-input" class="w-full text-center text-4xl p-5 border-4 border-indigo-50 rounded-3xl mb-10 outline-none focus:border-indigo-500 font-bold" placeholder="••••••">
            <div class="flex gap-6">
                <button onclick="closeAuthModal()" class="flex-1 bg-slate-100 text-slate-500 py-5 rounded-3xl font-bold text-lg">取消</button>
                <button id="auth-confirm-btn" class="flex-[2] bg-indigo-600 text-white py-5 rounded-3xl font-black text-2xl btn-push shadow-md">確認驗證</button>
            </div>
        </div>
    </div>

    <!-- 3. 學生登入視窗 -->
    <div id="name-modal" class="hidden absolute inset-0 z-[280] flex items-center justify-center bg-slate-900/90 backdrop-blur-xl p-6">
        <div class="bg-white p-12 rounded-[60px] shadow-2xl w-full max-w-sm text-center border-b-8 border-indigo-200">
            <h2 class="text-3xl font-black mb-8 text-indigo-700 font-bold">歡迎進入練習</h2>
            <div class="space-y-6 mb-10">
                <input type="text" id="st-name-input" class="w-full text-center text-2xl p-5 border-4 border-indigo-50 rounded-3xl outline-none focus:border-indigo-500 font-bold" placeholder="姓名或座號">
                <input type="text" id="st-code-input" maxlength="6" class="w-full text-center text-4xl p-5 border-4 border-amber-100 rounded-3xl outline-none focus:border-amber-500 font-bold tracking-widest" placeholder="6 碼序號">
            </div>
            <button onclick="initApp('student')" class="w-full bg-indigo-600 text-white py-6 rounded-3xl font-black text-2xl btn-push shadow-md font-bold">驗證並進入</button>
        </div>
    </div>

    <!-- 4. 教師端視圖 -->
    <div id="teacher-view" class="hidden h-full flex flex-col bg-slate-50">
        <header class="bg-white border-b px-6 py-5 flex justify-between items-center shrink-0 shadow-sm relative z-50">
            <div class="flex items-center gap-4">
                <button id="sidebar-toggle-btn" onclick="toggleSidebar()" class="bg-indigo-600 text-white px-4 py-2.5 rounded-xl shadow-lg hover:bg-indigo-700 font-black text-sm shrink-0">⚙️ 題庫設定</button>
                <div class="relative info-btn shrink-0">
                    <button class="bg-indigo-50 text-indigo-600 w-11 h-11 rounded-full flex items-center justify-center text-2xl border border-indigo-100 shadow-inner font-bold font-bold font-bold">💡</button>
                    <div class="tooltip-box font-bold text-sm">
                        <h4 class="font-black text-indigo-700 border-b pb-2 mb-2 font-bold">出題語法</h4>
                        <p class="leading-relaxed mb-3">簽：簽名、簽章<br>冒號前為生字解答。</p>
                        <h4 class="font-black text-indigo-700 border-b pb-2 mb-2 font-bold font-bold">操作機制</h4>
                        <p class="leading-relaxed">1. 切換題目自動全遮全鎖。<br>2. 停止作答後題目維持顯現。<br>3. 學生必須輸入下方序號登入。</p>
                    </div>
                </div>
                <div class="flex flex-col bg-amber-50 border border-amber-200 px-5 py-2 rounded-2xl shrink-0">
                    <span class="text-[10px] text-amber-600 font-black uppercase mb-1">學生登入序號</span>
                    <span id="display-join-code" class="text-2xl font-black text-amber-700 tracking-tighter leading-none">------</span>
                </div>
                <div class="flex flex-col gap-1">
                   <span class="text-[10px] text-slate-400 font-black uppercase pl-1">學生端預覽</span>
                   <div id="teacher-preview-box" class="text-indigo-600 text-sm truncate italic">無題目</div>
                </div>
                
                <button id="global-action-btn" onclick="toggleGlobalAction()" class="bg-indigo-600 text-white px-8 py-3 rounded-2xl shadow-xl font-black text-base btn-push">開始作答</button>

                <div class="flex items-center gap-3 bg-indigo-100 px-5 py-2 rounded-full border border-indigo-200">
                    <input type="checkbox" id="answer-toggle" onchange="syncAnswerReveal()" class="w-6 h-6 accent-indigo-600">
                    <label class="text-xs font-black text-indigo-700 uppercase">公布解答</label>
                </div>
                <div id="teacher-timer-box" class="flex items-center gap-3 bg-amber-50 px-5 py-2 rounded-full border border-amber-200 font-bold">
                    <label class="text-xs font-black text-amber-700 uppercase font-bold">限時(秒)</label>
                    <input type="number" id="timer-duration" value="30" min="0" class="w-16 text-center text-sm font-black bg-white border border-amber-200 rounded-lg py-1">
                </div>
                <button onclick="showQRCode()" class="bg-indigo-50 text-indigo-700 px-4 py-2.5 rounded-xl shadow-sm text-xs font-black font-bold">📲 連線碼</button>
                <button onclick="openAuthModal('change')" class="bg-slate-100 text-slate-600 px-3 py-2.5 rounded-xl text-xs font-black">🔑 密碼</button>
            </div>
            <div id="conn-count" class="bg-indigo-600 text-white px-6 py-2.5 rounded-full text-sm font-black shadow-lg">在線: 0</div>
        </header>
        <main class="flex-grow flex overflow-hidden">
            <aside id="teacher-sidebar" class="bg-white border-r flex flex-col shrink-0 shadow-inner z-40 w-80">
                <div id="sidebar-content" class="flex flex-col h-full font-bold">
                    <div class="p-8 border-b bg-slate-50 text-center font-bold">
                        <textarea id="data-input" class="w-full h-64 border-2 border-slate-100 rounded-3xl p-5 text-sm outline-none focus:border-indigo-500 font-bold" placeholder="生字：語詞、語詞"></textarea>
                        <button onclick="parseData()" class="w-full mt-6 bg-slate-800 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-black transition-all">同步內容並收起</button>
                    </div>
                    <div id="quiz-list-full" class="flex-grow overflow-y-auto p-5 space-y-4 bg-slate-50"></div>
                </div>
                <div id="sidebar-nav-vertical" class="hidden flex flex-col items-center py-8 gap-4 overflow-y-auto scrollbar-hide bg-slate-100 border-l border-slate-200"></div>
            </aside>
            <section class="flex-grow p-10 overflow-y-auto bg-slate-100 font-bold">
                <div class="flex justify-between items-center mb-8 px-6">
                    <div class="flex items-center gap-6">
                        <h3 class="text-3xl font-black text-slate-800 italic underline decoration-amber-400">實時監控牆</h3>
                        <div class="flex gap-3 bg-white p-1.5 rounded-full border shadow-inner font-bold font-bold">
                            <button onclick="forceAllMasks(true)" class="text-xs px-5 py-2 rounded-full font-black text-slate-500 border border-transparent hover:border-slate-200">全體遮蔽</button>
                            <button onclick="forceAllMasks(false)" class="text-xs px-5 py-2 rounded-full font-black text-indigo-600 border border-transparent hover:border-indigo-200">全體解除</button>
                        </div>
                    </div>
                    <button onclick="clearAllSubs()" class="text-sm font-black text-red-500 hover:underline">清空數據</button>
                </div>
                <div id="monitor-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8"></div>
            </section>
        </main>
    </div>

    <!-- 5. 學生端 -->
    <div id="student-view" class="hidden h-full flex flex-col bg-[#fffefc] font-bold">
        <header class="bg-white border-b px-10 py-5 flex justify-between items-center shrink-0 shadow-md relative z-40">
            <div class="flex flex-col font-bold">
                <div id="st-word" class="text-4xl font-black text-indigo-700 italic">漢字練習</div>
                <div id="st-id-display" class="text-xs font-black text-indigo-300 uppercase tracking-widest italic font-bold">ID: ----</div>
            </div>
            <div class="flex gap-6 items-center">
                <div id="timer-display" class="hidden bg-amber-500 text-white px-8 py-3 rounded-3xl font-black text-2xl shadow-xl animate-pulse font-bold">⏱ <span id="timer-seconds">--</span>s</div>
                <div id="reveal-status" class="bg-indigo-50 text-indigo-500 px-6 py-3 rounded-2xl font-black text-sm border border-indigo-100 flex items-center gap-3">
                    <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-indigo-500"></span></span>作答狀態中...
                </div>
                <button onclick="studentQuit()" class="bg-red-50 text-red-500 px-8 py-3 rounded-2xl font-black text-base border border-red-100 shadow-sm font-bold font-bold font-bold font-bold">🚪 退出</button>
            </div>
        </header>
        <main class="flex-grow flex items-center justify-start p-10 md:p-16 relative overflow-hidden font-bold">
            <div id="st-char-container" class="shrink-0 font-bold">
                <div id="st-waiting-msg" class="hidden font-bold">準備中，請等待老師開啟題目</div>
                <div id="st-char" class="kai-text text-slate-800 leading-none font-black text-center font-bold" style="opacity: 0;">?</div>
            </div>
            <div class="flex-grow flex items-center justify-center">
                <div id="zoom-wrapper" class="tian-grid-wrapper font-bold">
                    <div class="tian-grid-container shadow-2xl font-bold">
                        <div class="tian-grid-bg absolute inset-0"></div>
                        <div id="answer-overlay" class="kai-text font-bold font-bold font-bold font-bold"></div>
                        <img id="teacher-collab-layer" class="hidden font-bold">
                        <canvas id="main-canvas"></canvas>
                    </div>
                </div>
            </div>
            <div id="draggable-toolbar" class="bg-white/95 backdrop-blur-md rounded-[30px] shadow-2xl flex flex-col items-center gap-5 border border-indigo-50 font-bold">
                <div class="w-8 h-2 bg-slate-200 rounded-full mt-2.5 opacity-50"></div>
                <div class="flex flex-col gap-4" id="st-tools font-bold">
                    <button onclick="setStudentMode('pen', '#3b82f6')" class="st-btn w-11 h-11 rounded-2xl bg-blue-500 border-2 border-white shadow-md tool-active" data-color="#3b82f6"></button>
                    <button onclick="setStudentMode('eraser')" id="st-eraser-btn" class="st-btn w-11 h-11 rounded-2xl bg-white border-2 border-slate-100 flex items-center justify-center text-2xl shadow-sm font-bold">🧽</button>
                </div>
                <div class="flex flex-col gap-4 border-t border-slate-100 pt-5 font-bold font-bold font-bold">
                    <button id="st-undo-btn" onclick="undo()" class="st-btn bg-amber-100 text-amber-700 w-11 h-11 rounded-2xl font-black text-2xl flex items-center justify-center active:scale-90 shadow-sm font-bold">↩</button>
                    <button id="st-clear-btn" onclick="clearCanvas()" class="st-btn bg-slate-100 text-slate-600 w-11 h-11 rounded-2xl font-black text-2xl flex items-center justify-center active:scale-90 shadow-sm font-bold font-bold">🧹</button>
                </div>
                <div class="mb-2"></div>
            </div>
            <!-- 學生端縮放鍵 -->
            <div class="zoom-controls">
                <button onclick="adjustZoom(0.1)" class="w-16 h-16 bg-white rounded-full shadow-2xl border border-indigo-50 flex items-center justify-center text-4xl font-black text-indigo-600 active:scale-90 font-bold font-bold font-bold font-bold font-bold">+</button>
                <button onclick="adjustZoom(-0.1)" class="w-16 h-16 bg-white rounded-full shadow-xl border border-indigo-50 flex items-center justify-center text-4xl font-black text-indigo-600 active:scale-90 font-bold font-bold font-bold font-bold font-bold">-</button>
            </div>
        </main>
    </div>

    <!-- 6. 協作視窗 -->
    <div id="collab-modal" class="hidden fixed inset-0 z-[500] flex items-center justify-center bg-slate-900/85 p-6 font-bold">
        <div class="bg-white w-full max-w-5xl rounded-[60px] shadow-2xl flex flex-col overflow-hidden max-h-[95vh] font-bold">
            <header class="p-8 bg-indigo-600 text-white flex justify-between items-center shrink-0 font-bold">
                <div class="flex items-center gap-8 font-bold font-bold">
                    <div><h3 class="text-3xl font-black italic" id="collab-st-title font-bold">師生同步協作</h3><p class="text-xs opacity-80 uppercase font-black">教師畫筆獨立控制，上帝橡皮擦已啟動</p></div>
                    <div class="bg-indigo-700/50 px-6 py-3 rounded-3xl flex items-center gap-3 border border-white/20">
                        <input type="checkbox" id="collab-lock-student" onchange="syncStudentForceLock()" class="w-6 h-6 accent-indigo-400">
                        <label class="text-sm font-black font-bold">🔒 鎖定學生操作</label>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button onclick="clearStudentRemote()" class="bg-amber-500 hover:bg-amber-600 px-8 py-3 rounded-2xl font-black text-base shadow-xl transition-all">👤 清除學生筆劃</button>
                    <button onclick="closeCollab()" class="bg-white/20 px-8 py-3 rounded-2xl font-black text-base border border-white/30">關閉</button>
                </div>
            </header>
            <main class="flex-grow flex flex-col md:flex-row p-10 gap-12 items-center justify-center bg-slate-50 overflow-y-auto">
                <div class="relative bg-white shadow-2xl rounded-3xl overflow-hidden border-8 border-indigo-200 shrink-0 font-bold" style="width: 500px; height: 500px;">
                    <img id="collab-st-preview" class="absolute inset-0 z-10 w-full h-full object-contain pointer-events-none opacity-40 font-bold font-bold font-bold">
                    <canvas id="collab-canvas" class="relative z-20 w-full h-full font-bold font-bold font-bold"></canvas>
                </div>
                <div class="flex flex-col gap-6">
                    <button onclick="setCollabMode('pen', '#ef4444')" class="tc-tool w-16 h-16 rounded-3xl bg-red-500 border-4 border-white shadow-xl tool-active font-bold" data-tool="red"></button>
                    <button onclick="setCollabMode('pen', '#3b82f6')" class="tc-tool w-16 h-16 rounded-3xl bg-blue-500 border-4 border-white shadow-xl font-bold" data-tool="blue"></button>
                    <button onclick="setCollabMode('eraser')" class="tc-tool w-16 h-16 rounded-3xl bg-white border-4 border-white shadow-xl flex items-center justify-center text-4xl font-bold font-bold" data-tool="eraser">🧽</button>
                    <div class="border-t border-slate-200 pt-6 flex flex-col gap-6 font-bold font-bold font-bold">
                        <button onclick="undoCollab()" class="w-16 h-16 rounded-3xl bg-indigo-50 text-indigo-700 shadow-lg text-3xl font-bold">↩</button>
                        <button onclick="clearCollabCanvas()" class="w-16 h-16 rounded-3xl bg-slate-100 text-slate-600 shadow-lg text-3xl font-bold font-bold">🧹</button>
                    </div>
                </div>
            </main>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, deleteDoc, updateDoc, arrayUnion, getDocs } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyBBIi6sw-wUzp-Jxc3dXJhl5DZ3-6LMe-o", authDomain: "my-handwriting-tool.firebaseapp.com", projectId: "my-handwriting-tool", storageBucket: "my-handwriting-tool.firebasestorage.app", messagingSenderId: "649810632937", appId: "1:649810632937:web:085f7e5c8f5290d6da9078" };
    const app = initializeApp(firebaseConfig), db = getFirestore(app), auth = getAuth(app);
    const ID = "ice-hanzi-privacy-expert-final-v7-final"; 
    let user = null, quizData = [], curIdx = -1, stName = '', zoom = 1.0, collabTargetUid = null, isLocked = true, isSidebarCollapsed = true;
    let visibleUids = new Set(), currentJoinCode = "";

    onAuthStateChanged(auth, async u => { user = u; if(!u) await signInAnonymously(auth); });

    window.showNameInput = () => document.getElementById('name-modal').classList.remove('hidden');

    let authType = 'teacher';
    window.openAuthModal = (type) => {
        authType = type; const m = document.getElementById('auth-modal');
        document.getElementById('admin-pw-input').value = ""; m.classList.remove('hidden');
        document.getElementById('auth-title').innerText = type === 'teacher' ? "管理員登入" : "修改管理密碼";
    };
    window.closeAuthModal = () => document.getElementById('auth-modal').classList.add('hidden');

    document.getElementById('auth-confirm-btn').onclick = async () => {
        const val = document.getElementById('admin-pw-input').value.trim(); if(!val) return;
        if(authType === 'teacher'){
            const s = await getDoc(doc(db, 'artifacts', ID, 'public', 'data', 'config', 'admin'));
            if(val === (s.exists() ? s.data().adminPassword : "ice888")) { closeAuthModal(); initApp('teacher'); } else alert("密碼錯誤");
        } else { await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'config', 'admin'), { adminPassword: val }, { merge: true }); alert("修改成功"); closeAuthModal(); }
    };

    window.toggleSidebar = () => {
        isSidebarCollapsed = !isSidebarCollapsed;
        const sidebar = document.getElementById('teacher-sidebar'), content = document.getElementById('sidebar-content'), verticalNav = document.getElementById('sidebar-nav-vertical'), toggleBtn = document.getElementById('sidebar-toggle-btn');
        sidebar.style.width = isSidebarCollapsed ? '60px' : '320px';
        content.classList.toggle('hidden', isSidebarCollapsed);
        verticalNav.classList.toggle('hidden', !isSidebarCollapsed);
        toggleBtn.innerText = isSidebarCollapsed ? '🛠️' : '題庫設定';
    };

    window.toggleGlobalAction = async () => {
        const stateRef = doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current');
        const s = await getDoc(stateRef);
        const d = s.data();
        if (!d || !d.isStarted || d.isPaused) {
            const dur = parseInt(document.getElementById('timer-duration').value) || 0;
            const endTime = dur > 0 ? Date.now() + (dur * 1000) : 0;
            await setDoc(stateRef, { isStarted: true, isPaused: false, timerEndTime: endTime }, { merge: true });
        } else {
            await setDoc(stateRef, { isPaused: true }, { merge: true });
        }
    };

    window.syncPauseState = async () => { await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), { isPaused: document.getElementById('pause-toggle').checked }, { merge: true }); };

    window.initApp = async role => {
        if(!user) user = (await signInAnonymously(auth)).user;
        if(role === 'student'){
            const codeInput = document.getElementById('st-code-input').value.trim();
            const s = await getDoc(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'));
            if(!s.exists() || !s.data().joinCode) { alert("教室尚未開放，請等待老師同步題庫"); return; }
            if(codeInput !== s.data().joinCode) { alert("序號錯誤，請向老師詢問最新序號"); return; }
            stName = document.getElementById('st-name-input').value.trim() || `練習者-${Math.random().toString(36).substring(2,6).toUpperCase()}`;
            document.getElementById('st-id-display').innerText = `ID: ${stName}`;
            document.getElementById('name-modal').classList.add('hidden');
            await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { name: stName, image: '', ts: Date.now(), collabImage: '', clearReq: false, eraseReq: [], forceLocked: false });
        }
        document.getElementById('mode-selector').classList.add('hidden');
        if(role === 'teacher') setupTeacher(); else setupStudent();
    };

    window.studentQuit = async () => { if(confirm("確定退出？")) { if(user) await deleteDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid)); location.reload(); } };
    window.deleteOneStudent = async uid => { if(confirm("踢除此學生？對方將被強制連線重連。")) await deleteDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', uid)); };
    window.syncAnswerReveal = async () => { await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), { showAnswer: document.getElementById('answer-toggle').checked }, { merge: true }); };

    window.toggleMask = uid => { if(visibleUids.has(uid)) visibleUids.delete(uid); else visibleUids.add(uid); renderMonitorGrid(); };
    window.forceAllMasks = shouldMask => { visibleUids.clear(); if(!shouldMask) submissionsData.forEach(s => visibleUids.add(s.id)); renderMonitorGrid(); };

    let submissionsData = [];
    async function setupTeacher() {
        document.getElementById('teacher-view').classList.remove('hidden');
        const sRef = doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current');
        const sData = await getDoc(sRef);
        currentJoinCode = sData.exists() && sData.data().joinCode ? sData.data().joinCode : Math.floor(100000 + Math.random() * 900000).toString();
        document.getElementById('display-join-code').innerText = currentJoinCode;
        await setDoc(sRef, { joinCode: currentJoinCode, isPaused: true, isStarted: false, timerEndTime: 0 }, { merge: true });

        parseData(); initCollabCanvas();
        onSnapshot(collection(db, 'artifacts', ID, 'public', 'data', 'submissions'), snap => {
            submissionsData = []; snap.forEach(d => submissionsData.push({ id: d.id, ...d.data() }));
            document.getElementById('conn-count').innerText = `在線: ${snap.size}`;
            renderMonitorGrid();
        });
        
        onSnapshot(sRef, snap => {
            if(snap.exists()){
                const d = snap.data(); document.getElementById('app').dataset.gs = JSON.stringify(d);
                document.getElementById('pause-toggle').checked = !!d.isPaused;
                document.querySelectorAll('.number-btn-v').forEach(btn => btn.classList.toggle('active', parseInt(btn.dataset.idx) === d.idx));
                document.getElementById('answer-toggle').checked = !!d.showAnswer;
                if(d.data && d.idx !== undefined) {
                    const i = d.data[d.idx];
                    document.getElementById('teacher-preview-box').innerText = i ? i.context.split(i.target).join('□') : '無題目';
                }
                const actBtn = document.getElementById('global-action-btn');
                if(!d.isStarted || d.isPaused) { actBtn.innerText = "開始作答"; actBtn.className = "bg-indigo-600 text-white px-8 py-3 rounded-2xl shadow-xl font-black text-base btn-push"; }
                else { actBtn.innerText = "停止作答"; actBtn.className = "bg-red-500 text-white px-8 py-3 rounded-2xl shadow-xl font-black text-base btn-push"; }
            }
        });
    }

    function renderMonitorGrid() {
        const grid = document.getElementById('monitor-grid'); grid.innerHTML = '';
        submissionsData.forEach(data => {
            const isVisible = visibleUids.has(data.id);
            const card = document.createElement('div');
            card.className = "bg-white rounded-[32px] shadow-lg border p-3 relative overflow-hidden transition-all h-[180px]";
            card.innerHTML = `<div class="bg-indigo-600 text-white text-[9px] px-3 py-2 rounded-xl mb-2 flex justify-between items-center font-black"><span>${data.name}</span><div class="flex gap-1.5 font-bold"><button onclick="toggleMask('${data.id}')" class="bg-white/20 w-5 h-5 rounded flex items-center justify-center text-[10px]">${isVisible?'👁️':'👁️‍🗨️'}</button><button onclick="openCollab('${data.id}', '${data.name}', ${data.forceLocked})" class="bg-white/20 px-1 rounded-md text-[8px] font-black">🤝</button><button onclick="deleteOneStudent('${data.id}')" class="bg-red-500 w-5 h-5 rounded-full flex items-center justify-center text-[12px]">×</button></div></div><div class="relative w-full aspect-square">${!isVisible ? '<div class="monitor-mask font-black">內容遮蔽中</div>' : `<img src="${data.image || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'}" class="w-full aspect-square object-contain bg-white rounded-2xl shadow-inner font-bold">`}</div>`;
            grid.appendChild(card);
            if(collabTargetUid === data.id) document.getElementById('collab-st-preview').src = data.image;
        });
    }

    window.openCollab = (uid, name, locked) => { 
        collabTargetUid = uid; document.getElementById('collab-st-title').innerText = `協作：${name}`; 
        document.getElementById('collab-lock-student').checked = !!locked;
        document.getElementById('collab-modal').classList.remove('hidden'); 
        setTimeout(initCollabCanvas, 300);
    };
    window.closeCollab = () => { collabTargetUid = null; document.getElementById('collab-modal').classList.add('hidden'); };
    window.clearStudentRemote = async () => { if(collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { clearReq: true }); };
    window.syncStudentForceLock = async () => { if(collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { forceLocked: document.getElementById('collab-lock-student').checked }); };

    window.parseData = () => { 
        quizData = document.getElementById('data-input').value.split('\n').map(l => { const p = l.split(/[：:]/); return { target: p[0]?.trim() || '', context: p[1]?.trim() || '' }; }).filter(i => i.target !== ''); 
        renderNav(); forceAllMasks(true);
        syncGlobal({ data: quizData, idx: 0, ts: Date.now(), showAnswer: false, isPaused: true, isStarted: false, timerEndTime: 0 }); 
        if(!isSidebarCollapsed) toggleSidebar();
    };

    function renderNav() { 
        const navV = document.getElementById('sidebar-nav-vertical'), navFull = document.getElementById('quiz-list-full');
        navV.innerHTML = quizData.map((it, idx) => `<button onclick="setQuiz(${idx})" class="number-btn-v font-black text-slate-400 bg-white border border-slate-200 rounded-xl flex items-center justify-center text-sm" data-idx="${idx}">${idx+1}</button>`).join('');
        navFull.innerHTML = quizData.map((it, idx) => `<button onclick="setQuiz(${idx})" class="w-full text-left p-4 rounded-3xl border-2 border-white bg-white shadow-sm flex justify-between items-center" data-idx="${idx}"><span class="kai-text text-xl">${it.target}</span><span class="text-[10px] text-slate-300 font-black italic"># ${idx+1}</span></button>`).join('');
    }

    window.setQuiz = async idx => { curIdx = idx; forceAllMasks(true); syncGlobal({ idx, ts: Date.now(), showAnswer: false, isPaused: true, isStarted: false, timerEndTime: 0 }); };
    async function syncGlobal(p) { await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), { ...p }, { merge: true }); }

    function setupStudent() {
        document.getElementById('student-view').classList.remove('hidden'); initCanvas();
        let lastIdx = -1, timerInt = null, forceLocked = false;
        onSnapshot(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), s => {
            if(!s.exists()) { alert("您已被老師移除或連線中斷。"); location.reload(); return; }
            const d = s.data(); const layer = document.getElementById('teacher-collab-layer');
            if(d.collabImage) { layer.src = d.collabImage; layer.classList.remove('hidden'); } else layer.classList.add('hidden');
            if(d.clearReq) { clearCanvas(); updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { clearReq: false }); }
            if(d.eraseReq?.length) { ctx.globalCompositeOperation = 'destination-out'; d.eraseReq.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 25, 0, Math.PI*2); ctx.fill(); }); ctx.globalCompositeOperation = 'source-over'; updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { eraseReq: [] }); autoUp(); }
            forceLocked = !!d.forceLocked; checkTotalLock();
        });

        const checkTotalLock = () => {
            const gs = document.getElementById('app').dataset.gs; if(!gs) return;
            const d = JSON.parse(gs);
            let timeUp = d.timerEndTime > 0 && Date.now() >= d.timerEndTime;
            const locked = timeUp || d.isPaused || d.showAnswer || forceLocked || !d.isStarted;
            isLocked = locked;
            const statusMsg = !d.isStarted ? "⏸ 準備中，等待開啟" : (d.showAnswer ? "✨ 對照解答中" : (forceLocked ? "🔒 畫筆鎖定中" : (timeUp ? "🔒 限時結束" : (d.isPaused ? "⏸ 暫停作答" : "作答中..."))));
            updateLockUI(locked, statusMsg);
            document.getElementById('st-waiting-msg').classList.toggle('hidden', !!d.isStarted);
            document.getElementById('st-char').style.opacity = !d.isStarted ? '0' : '1';
        };

        onSnapshot(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), s => {
            if(s.exists()){
                const d = s.data(); document.getElementById('app').dataset.gs = JSON.stringify(d);
                if(d.data) quizData = d.data; const nIdx = d.idx || 0;
                if(nIdx !== lastIdx) { clearCanvas(); lastIdx = nIdx; }
                curIdx = nIdx; const i = quizData[curIdx] || { target: '?', context: '' };
                const charEl = document.getElementById('st-char'); 
                if(charEl) charEl.innerText = i.context.split(i.target).join('□');
                const updateFontSize = () => { let cEl = document.getElementById('st-char'); if(!cEl) return; let size = 180; cEl.style.fontSize = size + 'px'; const c = document.getElementById('st-char-container'); while ((cEl.scrollHeight > c.clientHeight || cEl.scrollWidth > c.clientWidth) && size > 30) { size -= 5; cEl.style.fontSize = size + 'px'; } }; setTimeout(updateFontSize, 50);
                const ansEl = document.getElementById('answer-overlay'); ansEl.innerText = i.target;
                const updateAnsFontSize = () => { let aSize = 420; ansEl.style.fontSize = aSize + 'px'; while ((ansEl.scrollHeight > ansEl.clientHeight || ansEl.scrollWidth > ansEl.clientWidth) && aSize > 40) { aSize -= 10; ansEl.style.fontSize = aSize + 'px'; } }; setTimeout(updateAnsFontSize, 50);
                document.getElementById('answer-overlay').classList.toggle('show', !!d.showAnswer);
                clearInterval(timerInt); const timerWrap = document.getElementById('timer-display');
                if(d.isStarted && !d.isPaused && d.timerEndTime > 0) {
                    timerWrap.classList.remove('hidden');
                    const updateTimer = () => { const rem = Math.max(0, Math.ceil((d.timerEndTime - Date.now())/1000)); document.getElementById('timer-seconds').innerText = rem; if(rem <= 0) { clearInterval(timerInt); checkTotalLock(); } };
                    timerInt = setInterval(updateTimer, 500); updateTimer();
                } else timerWrap.classList.add('hidden');
                checkTotalLock();
            }
        });
    }

    function updateLockUI(locked, msg) {
        document.querySelectorAll('.st-btn').forEach(b => b.classList.toggle('locked-tool', locked));
        const statusEl = document.getElementById('reveal-status'); if(statusEl) statusEl.innerText = msg;
    }

    const canvas = document.getElementById('main-canvas'), ctx = canvas.getContext('2d'), collabCanvas = document.getElementById('collab-canvas'), collabCtx = collabCanvas?.getContext('2d');
    let drawing = false, history = [], collabHistory = [], penColor = '#3b82f6', studentMode = 'pen', collabMode = 'pen';

    function initCanvas() {
        const reset = () => { canvas.width = 500; canvas.height = 500; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 14; ctx.strokeStyle = penColor; };
        reset(); window.addEventListener('resize', reset);
        const getXY = e => { const r = canvas.getBoundingClientRect(); const cx = (e.touches ? e.touches[0].clientX : e.clientX), cy = (e.touches ? e.touches[0].clientY : e.clientY); return { x: (cx - r.left) * (500 / r.width), y: (cy - r.top) * (500 / r.height) }; };
        canvas.onmousedown = canvas.ontouchstart = e => { if(isLocked) return; drawing = true; const p = getXY(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.globalCompositeOperation = studentMode === 'eraser' ? 'destination-out' : 'source-over'; ctx.strokeStyle = penColor; };
        canvas.onmousemove = canvas.ontouchmove = e => { if(!drawing || isLocked) return; if(e.cancelable) e.preventDefault(); const p = getXY(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
        window.onmouseup = window.ontouchend = () => { if(drawing) { drawing = false; history.push(canvas.toDataURL()); autoUp(); } };
    }

    window.setStudentMode = (m, c) => { if(isLocked) return; studentMode = m; if(c) penColor = c; document.querySelectorAll('.st-btn').forEach(b => b.classList?.toggle('tool-active', m === 'pen' && b.dataset?.color === c)); document.getElementById('st-eraser-btn').classList.toggle('tool-active', m === 'eraser'); };
    function initCollabCanvas() {
        if(!collabCanvas) return; collabCanvas.width = 500; collabCanvas.height = 500; collabCtx.lineCap = 'round'; collabCtx.lineJoin = 'round'; collabCtx.lineWidth = 10; collabCtx.strokeStyle = '#ef4444';
        let cDraw = false; const getXYC = e => { const r = collabCanvas.getBoundingClientRect(); const cx = (e.touches ? e.touches[0].clientX : e.clientX), cy = (e.touches ? e.touches[0].clientY : e.clientY); return { x: (cx - r.left) * (500 / r.width), y: (cy - r.top) * (500 / r.height) }; };
        collabCanvas.onmousedown = collabCanvas.ontouchstart = e => { cDraw = true; const p = getXYC(e); collabCtx.beginPath(); collabCtx.moveTo(p.x, p.y); collabCtx.globalCompositeOperation = collabMode === 'eraser' ? 'destination-out' : 'source-over'; };
        collabCanvas.onmousemove = collabCanvas.ontouchmove = async e => { if(!cDraw) return; if(e.cancelable) e.preventDefault(); const p = getXYC(e); collabCtx.lineTo(p.x, p.y); collabCtx.stroke(); if(collabMode === 'eraser' && collabTargetUid) { await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { eraseReq: arrayUnion({x: p.x, y: p.y}) }); } };
        collabCanvas.onmouseup = collabCanvas.onmouseleave = collabCanvas.ontouchend = async () => { if(cDraw) { cDraw = false; collabHistory.push(collabCanvas.toDataURL()); if(collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { collabImage: collabCanvas.toDataURL() }); } };
    }

    window.setCollabMode = (m, c) => { collabMode = m; if(c) collabCtx.strokeStyle = c; document.querySelectorAll('.tc-tool').forEach(b => b.classList.toggle('tool-active', b.dataset.tool === (m === 'eraser' ? 'eraser' : (c === '#ef4444' ? 'red' : 'blue')))); };
    window.undo = () => { if(!history.length || isLocked) return; history.pop(); const last = history[history.length-1]; ctx.clearRect(0,0,500,500); if(last){ const i = new Image(); i.onload = () => ctx.drawImage(i, 0,0,500,500); i.src = last; } autoUp(); };
    window.undoCollab = async () => { if(!collabHistory.length) return; collabHistory.pop(); const last = collabHistory[collabHistory.length-1]; collabCtx.clearRect(0,0,500,500); if(last){ const i = new Image(); i.onload = async () => { collabCtx.drawImage(i, 0,0,500,500); if(collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { collabImage: collabCanvas.toDataURL() }); }; i.src = last; } else { if(collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { collabImage: '' }); } };
    window.clearCanvas = () => { if(isLocked) return; ctx.clearRect(0,0,500,500); history = []; autoUp(); };
    window.clearCollabCanvas = async (sync = true) => { collabCtx.clearRect(0,0,500,500); collabHistory = []; if(sync && collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { collabImage: '' }); };
    window.adjustZoom = d => { zoom = Math.max(0.5, Math.min(2, zoom + d)); document.getElementById('zoom-wrapper').style.transform = `scale(${zoom})`; };
    async function autoUp() { if(!user || !stName) return; await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { name: stName, image: canvas.toDataURL('image/png', 0.2), ts: Date.now() }, { merge: true }); }
    
    window.showQRCode = () => {
        const url = window.location.href, b = document.createElement('div'); b.className = "fixed inset-0 z-[500] flex items-center justify-center bg-black/70 p-6"; b.onclick = (e) => { if(e.target === b) b.remove(); };
        b.innerHTML = `<div class="bg-white p-12 rounded-[60px] text-center shadow-2xl font-bold max-sm:w-full font-bold font-bold"><h3 class="font-black text-3xl mb-6 text-indigo-700 italic">掃描連線碼</h3><div id="qrc" class="flex justify-center mb-8"></div><div class="bg-slate-50 p-6 rounded-3xl mb-8 font-bold"><div class="text-[10px] text-slate-400 mb-2 font-black uppercase">連線網址</div><div class="text-xs text-indigo-600 truncate mb-6 font-black">${url}</div><button id="copy-link-btn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">📋 複製網址連結</button></div><p class="text-sm text-slate-400">點擊背景關閉視窗</p></div>`;
        document.body.appendChild(b); new QRCode(document.getElementById('qrc'), { text: url, width: 220, height: 220 });
        document.getElementById('copy-link-btn').onclick = () => { const el = document.createElement('textarea'); el.value = url; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); const btn = document.getElementById('copy-link-btn'); btn.innerText = "✅ 已複製！"; setTimeout(() => btn.innerText = "📋 複製網址連結", 2000); };
    };

    window.clearAllSubs = async () => { if(confirm("確定清空全班？學生端將會被強制重連。")) { const snap = await getDocs(collection(db, 'artifacts', ID, 'public', 'data', 'submissions')); snap.forEach(d => deleteDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', d.id))); } };
    const tb = document.getElementById('draggable-toolbar'); let isDragging = false, offset = { x: 0, y: 0 };
    const onStart = e => { isDragging = true; const cx = (e.touches ? e.touches[0].clientX : e.clientX), cy = (e.touches ? e.touches[0].clientY : e.clientY); offset.x = cx - tb.offsetLeft; offset.y = cy - tb.offsetTop; };
    const onMove = e => { if(!isDragging) return; if(e.cancelable) e.preventDefault(); const cx = (e.touches ? e.touches[0].clientX : e.clientX), cy = (e.touches ? e.touches[0].clientY : e.clientY); tb.style.left = `${cx - offset.x}px`; tb.style.top = `${cy - offset.y}px`; tb.style.right = 'auto'; };
    tb.addEventListener('mousedown', onStart); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', () => isDragging = false);
    tb.addEventListener('touchstart', onStart, {passive:false}); window.addEventListener('touchmove', onMove, {passive:false}); window.addEventListener('touchend', () => isDragging = false);
</script>
</body>
</html>
