<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>生字同步練習系統 - 專業協作版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4338ca; --amber: #f59e0b; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; touch-action: none; overflow: hidden; height: 100dvh; }
        
        .kai-text { font-family: "KaiTi TC", "STKaiti", "BiauKai", "標楷體", "DFKai-SB", "Apple LiSung", serif; font-weight: bold; }
        .pop-font { font-weight: 900; letter-spacing: -1px; }

        .tian-grid-wrapper { transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); transform-origin: center center; }
        .tian-grid-container {
            width: 85vw; max-width: 500px; aspect-ratio: 1 / 1; position: relative;
            background-color: #fff; border-radius: 16px; overflow: hidden; border: 4px solid #f87171;
        }

        .tian-grid-bg::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; border-top: 2.5px dashed #fca5a5; z-index: 1; height: 0; }
        .tian-grid-bg::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; border-left: 2.5px dashed #fca5a5; z-index: 1; width: 0; }

        .btn-push { transition: all 0.1s; box-shadow: 0 4px 0 #1e1b4b; }
        .btn-push:active { transform: translateY(2px); box-shadow: 0 1px 0 #1e1b4b; }
        
        /* 解答層 (z-5) */
        #answer-overlay {
            pointer-events: none; opacity: 0; transition: opacity 0.4s; color: rgba(67, 56, 202, 0.12);
            display: flex; align-items: center; justify-content: center;
            font-size: 460px; line-height: 1; z-index: 5; position: absolute; inset: 0;
        }
        #answer-overlay.show { opacity: 1; }

        /* 老師協作筆跡層 (z-7) - 學生看得到但摸不到 */
        #teacher-collab-layer { position: absolute; inset: 0; z-index: 7; pointer-events: none; width: 100%; height: 100%; object-fit: contain; }

        /* 學生主畫布 (z-10) */
        canvas { position: absolute; inset: 0; z-index: 10; touch-action: none; cursor: crosshair; width: 100%; height: 100%; background: transparent; }

        #draggable-toolbar {
            position: fixed; right: 15px; top: 25%; z-index: 100; cursor: move; touch-action: none; user-select: none;
            width: 44px; padding: 10px 4px;
        }

        .zoom-controls { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 50; }
        
        /* 協作小視窗 */
        #collab-modal { backdrop-filter: blur(8px); }
    </style>
</head>
<body>

<div id="app" class="h-full flex flex-col">
    <!-- 1. 模式選擇 -->
    <div id="mode-selector" class="absolute inset-0 z-[150] flex flex-col items-center justify-center bg-white p-6">
        <h1 class="text-6xl md:text-8xl pop-font text-indigo-700 mb-16 text-center italic tracking-tighter">生字同步練習</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 w-full max-w-3xl px-4">
            <button onclick="authTeacher()" class="bg-indigo-600 text-white p-12 rounded-[50px] btn-push text-3xl font-black flex flex-col items-center shadow-xl">
                <span class="text-6xl mb-4">👨‍🏫</span>教師主控
            </button>
            <button onclick="window.showNameInput()" class="bg-amber-500 text-white p-12 rounded-[50px] btn-push text-3xl font-black flex flex-col items-center shadow-xl">
                <span class="text-6xl mb-4">👶</span>學生練習
            </button>
        </div>
    </div>

    <!-- 2. 學生姓名輸入 -->
    <div id="name-modal" class="hidden absolute inset-0 z-[160] flex items-center justify-center bg-slate-900/90 backdrop-blur-xl">
        <div class="bg-white p-12 rounded-[60px] shadow-2xl w-full max-w-sm mx-6 text-center border-b-8 border-indigo-200">
            <h2 class="text-3xl font-black mb-6 text-indigo-700">準備進入教室</h2>
            <input type="text" id="st-name-input" class="w-full text-center text-3xl p-5 border-4 border-indigo-50 rounded-3xl mb-10 outline-none focus:border-indigo-500 font-bold" placeholder="姓名或座號">
            <button onclick="initApp('student')" class="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black text-2xl btn-push shadow-md">確認進入</button>
        </div>
    </div>

    <!-- 3. 教師主控端 -->
    <div id="teacher-view" class="hidden h-full flex flex-col bg-slate-50">
        <header class="bg-white border-b px-6 py-4 flex justify-between items-center shrink-0 shadow-sm relative z-50">
            <div class="flex items-center gap-6">
                <h2 class="font-black text-indigo-700 text-2xl tracking-tighter italic pop-font">管理控制台</h2>
                <div class="flex gap-2">
                    <button onclick="showQRCode()" class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-xl font-black text-xs border border-indigo-100">連線碼</button>
                    <button onclick="changeAdminPassword()" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl font-black text-xs border border-slate-200 hover:bg-slate-200">🔑 修改密碼</button>
                </div>
                <div class="flex items-center gap-2 bg-indigo-100 px-4 py-2 rounded-full border border-indigo-200">
                    <input type="checkbox" id="answer-toggle" onchange="syncAnswerReveal()" class="w-5 h-5 accent-indigo-600">
                    <label class="text-[10px] font-black text-indigo-700 uppercase">📢 公布解答</label>
                </div>
            </div>
            <div id="conn-count" class="bg-indigo-600 text-white px-6 py-2 rounded-full text-xs font-black shadow-lg">在線: 0 人</div>
        </header>
        <main class="flex-grow flex overflow-hidden">
            <aside class="w-72 bg-white border-r flex flex-col shrink-0 shadow-inner">
                <div class="p-5 border-b bg-slate-50">
                    <textarea id="data-input" class="w-full h-32 border-2 border-slate-100 rounded-2xl p-4 text-xs outline-none focus:border-indigo-500 font-bold" placeholder="格式：生字：詞語"></textarea>
                    <button onclick="parseData()" class="w-full mt-2 bg-slate-800 text-white py-3 rounded-xl font-bold text-xs shadow-md">同步題庫</button>
                </div>
                <div id="quiz-list" class="flex-grow overflow-y-auto p-4 space-y-3"></div>
            </aside>
            <section class="flex-grow p-8 overflow-y-auto bg-slate-100">
                <div class="flex justify-between items-center mb-6 px-4">
                    <h3 class="text-2xl font-black text-slate-800 italic underline decoration-amber-400 font-bold">學生實作牆</h3>
                    <button onclick="clearAllSubs()" class="text-xs font-bold text-red-500 hover:underline">清空全體數據</button>
                </div>
                <div id="monitor-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
            </section>
        </main>
    </div>

    <!-- 4. 學生端 -->
    <div id="student-view" class="hidden h-full flex flex-col bg-[#fffefc]">
        <header class="bg-white border-b px-8 py-4 flex justify-between items-center shrink-0 shadow-md relative z-40">
            <div class="flex flex-col">
                <div id="st-word" class="text-3xl font-black text-indigo-700 leading-none mb-1 tracking-tight italic">載入中...</div>
                <div id="st-id-display" class="text-[10px] font-black text-indigo-300 uppercase tracking-widest italic font-bold">ID: ----</div>
            </div>
            <div class="flex gap-3">
                <div id="reveal-status" class="bg-indigo-50 text-indigo-400 px-4 py-2 rounded-2xl font-black text-xs border border-indigo-100 flex items-center gap-2">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
                    </span>
                    等待解答...
                </div>
                <button onclick="studentQuit()" class="bg-red-50 text-red-500 px-6 py-2 rounded-2xl font-black text-sm border border-red-100 shadow-sm font-bold">🚪 退出教室</button>
            </div>
        </header>
        <main class="flex-grow flex flex-col md:flex-row p-6 gap-8 overflow-hidden relative items-center justify-center">
            <div class="flex-grow flex flex-col md:flex-row gap-8 h-full items-center justify-center">
                <div class="h-1/5 md:h-full md:w-1/4 flex items-center justify-center bg-white rounded-[40px] border-4 border-amber-200 shadow-xl shrink-0 aspect-square overflow-hidden relative">
                    <div id="st-char" class="kai-text text-[100px] md:text-[230px] text-slate-800 leading-none font-black">?</div>
                </div>
                <div class="flex-grow h-full flex items-center justify-center overflow-hidden">
                    <div id="zoom-wrapper" class="tian-grid-wrapper">
                        <div class="tian-grid-container shadow-2xl">
                            <div class="tian-grid-bg absolute inset-0"></div>
                            <div id="answer-overlay" class="kai-text"></div>
                            <!-- 協作層：老師筆跡顯示在這裡 -->
                            <img id="teacher-collab-layer" class="hidden">
                            <canvas id="main-canvas"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 工具列 (44px) -->
            <div id="draggable-toolbar" class="bg-white/95 backdrop-blur-md rounded-[24px] shadow-2xl flex flex-col items-center gap-4 border border-indigo-50">
                <div class="w-7 h-1 bg-slate-200 rounded-full mt-1.5 opacity-50"></div>
                <div class="flex flex-col gap-3.5">
                    <button onclick="changeColor('#1e293b')" class="w-10 h-10 rounded-xl bg-slate-800 border-2 border-white shadow-sm active:scale-110"></button>
                    <button onclick="changeColor('#ef4444')" class="w-10 h-10 rounded-xl bg-red-500 border-2 border-white shadow-sm active:scale-110"></button>
                    <button onclick="changeColor('#3b82f6')" class="w-10 h-10 rounded-xl bg-blue-500 border-2 border-white shadow-sm active:scale-110"></button>
                </div>
                <div class="flex flex-col gap-3.5 border-t border-slate-100 pt-3.5">
                    <button onclick="undo()" class="bg-amber-100 text-amber-700 w-10 h-10 rounded-xl font-black text-xl flex items-center justify-center active:scale-90 shadow-sm font-bold">↩</button>
                    <button onclick="clearCanvas()" class="bg-slate-100 text-slate-600 w-10 h-10 rounded-xl font-black text-xl flex items-center justify-center active:scale-90 shadow-sm">🧹</button>
                </div>
                <div class="mb-2"></div>
            </div>

            <div class="zoom-controls">
                <button onclick="adjustZoom(0.1)" class="w-12 h-12 bg-white rounded-full shadow-xl border border-indigo-50 flex items-center justify-center text-2xl font-black text-indigo-600 active:scale-90">+</button>
                <button onclick="adjustZoom(-0.1)" class="w-12 h-12 bg-white rounded-full shadow-xl border border-indigo-50 flex items-center justify-center text-2xl font-black text-indigo-600 active:scale-90">-</button>
            </div>
        </main>
    </div>

    <!-- 5. 老師端協作視窗 -->
    <div id="collab-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/80 p-4">
        <div class="bg-white w-full max-w-4xl rounded-[40px] shadow-2xl flex flex-col overflow-hidden max-h-[90vh]">
            <header class="p-6 bg-indigo-600 text-white flex justify-between items-center">
                <div class="flex flex-col">
                    <h3 class="text-2xl font-black italic" id="collab-st-title">與學生協作中</h3>
                    <p class="text-xs opacity-80">您的筆跡將同步至該學生底層</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="clearStudentRemote()" class="bg-white/20 hover:bg-white/40 px-6 py-2 rounded-2xl font-black text-sm transition-all border border-white/30">幫他清空筆跡</button>
                    <button onclick="closeCollab()" class="bg-red-500 px-6 py-2 rounded-2xl font-black text-sm shadow-lg">關閉協作</button>
                </div>
            </header>
            <main class="flex-grow flex flex-col md:flex-row p-8 gap-8 items-center justify-center bg-slate-50">
                <div class="relative bg-white shadow-xl rounded-2xl overflow-hidden border-4 border-indigo-200" style="width: 400px; height: 400px;">
                    <!-- 田字格背景 -->
                    <div class="absolute inset-0 pointer-events-none opacity-20">
                        <div class="absolute top-1/2 left-0 right-0 border-t-2 border-dashed border-red-400"></div>
                        <div class="absolute left-1/2 top-0 bottom-0 border-l-2 border-dashed border-red-400"></div>
                    </div>
                    <!-- 學生筆跡預覽 (唯讀) -->
                    <img id="collab-st-preview" class="absolute inset-0 z-10 w-full h-full object-contain pointer-events-none opacity-40">
                    <!-- 老師協作畫布 -->
                    <canvas id="collab-canvas" class="relative z-20 w-full h-full"></canvas>
                </div>
                <div class="flex flex-col gap-4">
                    <button onclick="setCollabColor('#ef4444')" class="w-14 h-14 rounded-full bg-red-500 border-4 border-white shadow-xl active:scale-95"></button>
                    <button onclick="setCollabColor('#3b82f6')" class="w-14 h-14 rounded-full bg-blue-500 border-4 border-white shadow-xl active:scale-95"></button>
                    <button onclick="clearCollabCanvas()" class="w-14 h-14 rounded-full bg-white flex items-center justify-center shadow-xl text-2xl active:scale-95">🧹</button>
                </div>
            </main>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, deleteDoc, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBBIi6sw-wUzp-Jxc3dXJhl5DZ3-6LMe-o",
        authDomain: "my-handwriting-tool.firebaseapp.com",
        projectId: "my-handwriting-tool",
        storageBucket: "my-handwriting-tool.firebasestorage.app",
        messagingSenderId: "649810632937",
        appId: "1:649810632937:web:085f7e5c8f5290d6da9078"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const ID = "ice-handwriting-collab-v1"; 
    let user, quizData = [], curIdx = -1, stName = '', zoom = 1.0;
    let collabTargetUid = null;

    window.showNameInput = () => document.getElementById('name-modal').classList.remove('hidden');

    onAuthStateChanged(auth, async (u) => { 
        user = u; 
        if(!u) await signInAnonymously(auth); 
    });

    window.authTeacher = async () => {
        const configRef = doc(db, 'artifacts', ID, 'public', 'data', 'config', 'admin');
        const s = await getDoc(configRef);
        const pw = s.exists() ? s.data().adminPassword : "ice888";
        const input = prompt("請輸入管理者密碼：");
        if(input === pw) initApp('teacher'); else if(input !== null) alert("密碼錯誤");
    };

    window.changeAdminPassword = async () => {
        const newPw = prompt("請輸入新的管理密碼：");
        if(newPw && newPw.trim()) {
            await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'config', 'admin'), { adminPassword: newPw.trim() }, { merge: true });
            alert("密碼修改成功！下次登入生效。");
        }
    };

    window.initApp = async (role) => {
        if(role === 'student'){
            let n = document.getElementById('st-name-input').value.trim();
            if(!n) n = `練習者-${Math.random().toString(36).substring(2,6).toUpperCase()}`;
            stName = n;
            document.getElementById('st-id-display').innerText = `ID: ${stName}`;
            document.getElementById('name-modal').classList.add('hidden');
            await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { name: stName, image: '', ts: Date.now(), collabImage: '', clearReq: false });
        }
        document.getElementById('mode-selector').classList.add('hidden');
        if(role === 'teacher') setupTeacher(); else setupStudent();
    };

    window.studentQuit = async () => {
        if(!confirm("確定退出？")) return;
        if(user) await deleteDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid));
        location.reload();
    };

    window.deleteOneStudent = async (uid) => {
        if(!confirm("確定要移除這位學生嗎？")) return;
        try {
            await deleteDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', uid));
        } catch(e) { console.error("Delete failed", e); }
    };

    window.syncAnswerReveal = async () => {
        const revealed = document.getElementById('answer-toggle').checked;
        await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), { showAnswer: revealed }, { merge: true });
    };

    // --- 教師端邏輯 ---
    function setupTeacher() {
        document.getElementById('teacher-view').classList.remove('hidden');
        document.getElementById('data-input').value = "簽：簽名\n遞：遞給\n傻：傻瓜";
        parseData();
        initCollabCanvas();

        onSnapshot(collection(db, 'artifacts', ID, 'public', 'data', 'submissions'), (snap) => {
            const grid = document.getElementById('monitor-grid');
            grid.innerHTML = '';
            document.getElementById('conn-count').innerText = `在線: ${snap.size} 人`;
            snap.forEach(d => {
                const data = d.data();
                const card = document.createElement('div');
                card.className = "bg-white rounded-[32px] shadow-lg border-2 border-slate-100 p-2 relative overflow-hidden group";
                card.innerHTML = `
                    <div class="bg-indigo-600 text-white text-[9px] px-3 py-1.5 rounded-2xl mb-1 flex justify-between font-black items-center">
                        <span class="truncate pr-2">${data.name}</span>
                        <div class="flex gap-1">
                             <button onclick="openCollab('${d.id}', '${data.name}')" class="bg-white/20 hover:bg-white/40 px-1.5 rounded-md text-[8px] font-bold">🤝 協作</button>
                             <button onclick="deleteOneStudent('${d.id}')" class="bg-red-500 w-4 h-4 rounded-full flex items-center justify-center hover:bg-red-700 text-white font-bold text-xs">×</button>
                        </div>
                    </div>
                    <img src="${data.image || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'}" class="w-full aspect-square object-contain bg-white rounded-2xl">
                `;
                grid.appendChild(card);
                
                // 如果正在協作此學生，更新預覽
                if(collabTargetUid === d.id) {
                    document.getElementById('collab-st-preview').src = data.image;
                }
            });
        });
    }

    window.openCollab = async (uid, name) => {
        collabTargetUid = uid;
        document.getElementById('collab-st-title').innerText = `正在協作：${name}`;
        document.getElementById('collab-modal').classList.remove('hidden');
        clearCollabCanvas();
    };

    window.closeCollab = () => {
        collabTargetUid = null;
        document.getElementById('collab-modal').classList.add('hidden');
    };

    window.clearStudentRemote = async () => {
        if(!collabTargetUid) return;
        await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { clearReq: true });
    };

    window.parseData = () => {
        quizData = document.getElementById('data-input').value.split('\n').map(l => {
            const p = l.split(/[：:]/);
            return { char: p[0]?.trim() || '?', word: p[1]?.trim() || '' };
        }).filter(i => i.char !== '?');
        renderList();
        syncGlobal({ type: 'UPDATE', data: quizData, idx: 0, ts: Date.now() });
    };

    function renderList() {
        document.getElementById('quiz-list').innerHTML = quizData.map((it, idx) => `
            <button onclick="setQuiz(${idx})" class="w-full text-left p-4 rounded-2xl border-2 transition-all ${curIdx === idx ? 'border-indigo-600 bg-indigo-50 shadow-md scale-[1.02]' : 'border-slate-50 opacity-60'}">
                <span class="kai-text text-2xl mr-3 font-black">${it.char}</span><span class="text-xs text-slate-400 font-bold italic">${it.word}</span>
            </button>
        `).join('');
    }

    window.setQuiz = (idx) => { curIdx = idx; renderList(); syncGlobal({ idx, ts: Date.now() }); };
    async function syncGlobal(p) { await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), { ...p }, { merge: true }); }

    // --- 學生端邏輯 ---
    function setupStudent() {
        document.getElementById('student-view').classList.remove('hidden');
        initCanvas();
        let lastIdx = -1;

        onSnapshot(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), (s) => {
            if(!s.exists()) { alert("連線已結束。"); location.reload(); return; }
            const d = s.data();
            // 處理協作筆跡
            if(d.collabImage) {
                const img = document.getElementById('teacher-collab-layer');
                img.src = d.collabImage;
                img.classList.remove('hidden');
            } else {
                document.getElementById('teacher-collab-layer').classList.add('hidden');
            }
            // 處理清空請求
            if(d.clearReq) {
                clearCanvas();
                updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { clearReq: false });
            }
        });

        onSnapshot(doc(db, 'artifacts', ID, 'public', 'data', 'gameState', 'current'), (s) => {
            if(s.exists()){
                const d = s.data();
                if(d.data) quizData = d.data;
                const newIdx = d.idx !== undefined ? d.idx : 0;
                if(newIdx !== lastIdx) { clearCanvas(); lastIdx = newIdx; }
                curIdx = newIdx;
                const i = quizData[curIdx] || { char: '?', word: '' };
                document.getElementById('st-char').innerText = i.char;
                document.getElementById('st-word').innerText = i.word;
                document.getElementById('answer-overlay').innerText = i.char;
                const revealed = !!d.showAnswer;
                document.getElementById('answer-overlay').classList.toggle('show', revealed);
                document.getElementById('reveal-status').innerHTML = revealed ? 
                    `<span class='text-indigo-600 font-bold'>✨ 解答公布，請對照！</span>` : 
                    `<span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span></span>等待解答...`;
            }
        });
    }

    // --- 畫布與協作邏輯 ---
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');
    const collabCanvas = document.getElementById('collab-canvas');
    const collabCtx = collabCanvas?.getContext('2d');
    let drawing = false, history = [], color = '#1e293b';

    function initCanvas() {
        const reset = () => {
            canvas.width = 500; canvas.height = 500;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.lineWidth = 14;
            ctx.strokeStyle = color;
        };
        reset(); window.addEventListener('resize', reset);
        const getXY = (e) => {
            const r = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (cx - r.left) * (500 / r.width), y: (cy - r.top) * (500 / r.height) };
        };
        const start = (e) => { drawing = true; const p = getXY(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.strokeStyle = color; };
        const move = (e) => { if(!drawing) return; e.preventDefault(); const p = getXY(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
        const end = () => { if(drawing) { drawing = false; history.push(canvas.toDataURL()); autoUp(); } };
        canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
        canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', move, {passive:false}); canvas.addEventListener('touchend', end);
    }

    function initCollabCanvas() {
        if(!collabCanvas) return;
        collabCanvas.width = 500; collabCanvas.height = 500;
        collabCtx.lineCap = 'round'; collabCtx.lineJoin = 'round'; collabCtx.lineWidth = 10;
        collabCtx.strokeStyle = '#ef4444';
        let cDrawing = false;
        const getXY = (e) => {
            const r = collabCanvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (cx - r.left) * (500 / r.width), y: (cy - r.top) * (500 / r.height) };
        };
        const start = (e) => { cDrawing = true; const p = getXY(e); collabCtx.beginPath(); collabCtx.moveTo(p.x, p.y); };
        const move = (e) => { if(!cDrawing) return; e.preventDefault(); const p = getXY(e); collabCtx.lineTo(p.x, p.y); collabCtx.stroke(); };
        const end = async () => { 
            if(cDrawing) { 
                cDrawing = false; 
                if(collabTargetUid) {
                    const img = collabCanvas.toDataURL('image/png', 0.2);
                    await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { collabImage: img });
                }
            } 
        };
        collabCanvas.addEventListener('mousedown', start); collabCanvas.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
        collabCanvas.addEventListener('touchstart', start); collabCanvas.addEventListener('touchmove', move); collabCanvas.addEventListener('touchend', end);
    }

    window.changeColor = (c) => color = c;
    window.setCollabColor = (c) => collabCtx.strokeStyle = c;
    window.clearCanvas = () => { ctx.clearRect(0,0,500,500); history = []; autoUp(); };
    window.clearCollabCanvas = async () => { 
        collabCtx.clearRect(0,0,500,500); 
        if(collabTargetUid) await updateDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', collabTargetUid), { collabImage: '' });
    };
    window.undo = () => {
        if(history.length === 0) return;
        history.pop(); const last = history[history.length-1];
        ctx.clearRect(0,0,500,500);
        if(last){ const img = new Image(); img.onload = () => ctx.drawImage(img, 0,0,500,500); img.src = last; }
        autoUp();
    };
    window.adjustZoom = (d) => { zoom = Math.max(0.5, Math.min(2, zoom + d)); document.getElementById('zoom-wrapper').style.transform = `scale(${zoom})`; };

    async function autoUp() {
        if(!user || !stName) return;
        const image = canvas.toDataURL('image/png', 0.2);
        await setDoc(doc(db, 'artifacts', ID, 'public', 'data', 'submissions', user.uid), { name: stName, image, ts: Date.now() }, { merge: true });
    }

    window.showQRCode = () => {
        const box = document.createElement('div');
        box.className = "fixed inset-0 z-[300] flex items-center justify-center bg-black/70 p-6";
        box.onclick = () => box.remove();
        box.innerHTML = `<div class="bg-white p-10 rounded-[40px] text-center shadow-2xl"><h3 class="font-black text-2xl mb-4 text-indigo-700 italic tracking-tighter font-bold">掃描 QR 連線</h3><div id="qrc" class="flex justify-center mb-6"></div><p class="text-[10px] text-slate-400 font-bold italic">點擊背景關閉視窗</p></div>`;
        document.body.appendChild(box);
        new QRCode(document.getElementById('qrc'), { text: window.location.href, width: 220, height: 220 });
    };
</script>
</body>
</html>
